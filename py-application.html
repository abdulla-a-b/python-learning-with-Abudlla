<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Python Applications — Crash Course</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f0a;--s1:#0e160e;--s2:#142014;--gr1:#00e676;--gr2:#69f0ae;--am:#ffab00;--bl:#2979ff;--rd:#ff1744;--cy:#00e5ff;--tx:#e8f5e9;--t2:#81c784;--t3:#388e3c;--mono:'Roboto Mono',monospace;--font:'Cabinet Grotesk',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* Data flow animation */
.data-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.data-line{position:absolute;width:1px;background:linear-gradient(180deg,transparent,var(--gr1),transparent);animation:dataFlow linear infinite;opacity:.15}
@keyframes dataFlow{from{transform:translateY(-100%)}to{transform:translateY(200vh)}}

.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.topbar{height:62px;background:rgba(10,15,10,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,230,118,.15);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:14px}
.logo-badge{width:38px;height:38px;background:linear-gradient(135deg,#1a3a1a,#0d2a0d);border:2px solid var(--gr1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 14px rgba(0,230,118,.3)}
.logo-name{font-size:16px;font-weight:800;color:var(--gr1)}
.logo-track{font-size:11px;color:var(--t3)}
.prog-wrap{display:flex;align-items:center;gap:12px}
.prog-pct{font-family:var(--mono);font-size:13px;color:var(--gr1)}
.prog-bar{width:160px;height:6px;background:rgba(0,230,118,.08);border-radius:3px;overflow:hidden;border:1px solid rgba(0,230,118,.15)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gr1),var(--cy));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;box-shadow:0 0 8px rgba(0,230,118,.4)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:rgba(10,15,10,.9);backdrop-filter:blur(12px);border-right:1px solid rgba(0,230,118,.1);overflow-y:auto;flex-shrink:0;padding:12px 0}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:10px 20px;font-family:var(--mono)}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;font-size:13px;font-weight:600;color:var(--t2);opacity:0;animation:fadeUp .4s ease forwards}
@keyframes fadeUp{to{opacity:1}}
.sb-item:hover{background:rgba(0,230,118,.06);color:var(--tx)}
.sb-item.active{background:rgba(0,230,118,.1);border-left-color:var(--gr1);color:var(--gr1)}
.sb-item.done .sb-dot{background:var(--gr1);box-shadow:0 0 6px var(--gr1)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0;transition:all .3s}
.sb-num{font-family:var(--mono);font-size:11px;color:var(--t3);min-width:22px}
.main{flex:1;overflow-y:auto}
.lesson{padding:40px 48px;max-width:900px;animation:slideUp .5s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.project-hero{background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,229,255,.05));border:1px solid rgba(0,230,118,.2);border-radius:12px;padding:24px;margin-bottom:28px;position:relative;overflow:hidden}
.project-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(0,230,118,.15),transparent);border-radius:50%}
.project-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gr1);margin-bottom:6px;font-family:var(--mono)}
.project-name{font-size:22px;font-weight:800;margin-bottom:6px;color:var(--tx)}
.project-stack{font-family:var(--mono);font-size:12px;color:var(--t3);margin-bottom:10px}
.project-desc{font-size:14px;color:var(--t2);line-height:1.7}
.mit-badge{display:inline-flex;align-items:center;gap:8px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;margin-bottom:14px}
.b-live{background:rgba(41,121,255,.08);color:var(--bl);border-color:rgba(41,121,255,.3)}
.b-scaffold{background:rgba(255,171,0,.08);color:var(--am);border-color:rgba(255,171,0,.3)}
.b-flip{background:rgba(0,229,255,.06);color:var(--cy);border-color:rgba(0,229,255,.3)}
.b-real{background:rgba(0,230,118,.06);color:var(--gr1);border-color:rgba(0,230,118,.3)}
.lesson-title{font-size:28px;font-weight:800;margin-bottom:8px;color:var(--tx);line-height:1.2}
.lesson-desc{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:24px;max-width:640px}
.concept-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px;margin:14px 0}
.c-card{background:rgba(0,230,118,.03);border:1px solid rgba(0,230,118,.12);border-radius:8px;padding:14px;transition:all .2s}
.c-card:hover{background:rgba(0,230,118,.07);border-color:rgba(0,230,118,.3);transform:translateY(-2px)}
.c-icon{font-size:22px;margin-bottom:6px}
.c-name{font-size:12px;font-weight:700;color:var(--gr1);margin-bottom:3px;font-family:var(--mono)}
.c-desc{font-size:12px;color:var(--t2);line-height:1.5}
.code-wrap{background:#050d05;border:1px solid rgba(0,230,118,.2);border-radius:10px;overflow:hidden;margin:18px 0;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.code-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,230,118,.05);border-bottom:1px solid rgba(0,230,118,.12)}
.code-dots{display:flex;gap:6px}
.cd{width:10px;height:10px;border-radius:50%}
.cd-r{background:#ff5f57}.cd-y{background:#ffbd2e}.cd-g{background:#28c840}
.code-lang{font-family:var(--mono);font-size:11px;color:var(--gr1)}
.copy-btn{background:none;border:1px solid rgba(0,230,118,.2);color:var(--t3);font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:var(--mono);transition:all .2s}
.copy-btn:hover{border-color:var(--gr1);color:var(--gr1)}
.code-body{padding:18px;font-family:var(--mono);font-size:13px;line-height:2;overflow-x:auto}
.cl{display:block;opacity:0;animation:lineIn .35s ease forwards}
@keyframes lineIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.kw{color:#c084fc;font-weight:600}.fn{color:#86efac}.st{color:#a3e635}.cm{color:#365936;font-style:italic}.nm{color:#fbbf24}.bi{color:#67e8f9}.op{color:#f9a8d4}.pu{color:#d1fae5}.de{color:#bfdbfe}.sp{color:#f0abfc}
.viz{background:rgba(0,230,118,.02);border:1px solid rgba(0,230,118,.1);border-radius:8px;padding:18px;margin:18px 0}
.viz-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:12px;font-family:var(--mono)}
.arch-box{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;font-family:var(--mono)}
.quiz-wrap{background:rgba(0,230,118,.03);border:1px solid rgba(0,230,118,.15);border-radius:10px;padding:22px;margin:20px 0}
.quiz-q{font-size:14px;font-weight:700;margin-bottom:16px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{padding:11px 16px;border:1.5px solid rgba(0,230,118,.12);border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);background:rgba(0,0,0,.2);transition:all .2s;text-align:left;font-family:var(--font)}
.q-opt:hover:not(:disabled){border-color:var(--gr1);color:var(--tx);background:rgba(0,230,118,.07);padding-left:20px}
.q-opt.correct{border-color:var(--gr1)!important;background:rgba(0,230,118,.1)!important;color:var(--gr1)!important;animation:popIn .4s ease}
.q-opt.wrong{border-color:var(--rd)!important;background:rgba(255,23,68,.07)!important;color:var(--rd)!important;animation:shake .4s ease}
@keyframes popIn{0%{transform:scale(.97)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.quiz-fb{display:none;margin-top:12px;padding:12px 16px;border-radius:6px;font-size:13px;line-height:1.6;font-weight:600}
.quiz-fb.show{display:block;animation:slideUp .3s ease}
.quiz-fb.ok{background:rgba(0,230,118,.08);color:var(--gr1);border:1px solid rgba(0,230,118,.25)}
.quiz-fb.fail{background:rgba(255,23,68,.06);color:var(--rd);border:1px solid rgba(255,23,68,.2)}
.tip{border-left:3px solid var(--gr1);background:rgba(0,230,118,.04);padding:14px 18px;border-radius:0 8px 8px 0;margin:18px 0;font-size:13px;color:var(--t2);line-height:1.7}
.tip strong{color:var(--gr1);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:var(--mono)}
.nav-footer{display:flex;gap:12px;margin-top:32px;padding-top:22px;border-top:1px solid rgba(0,230,118,.08)}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .2s;font-family:var(--font)}
.btn-ghost{border-color:rgba(0,230,118,.2);background:none;color:var(--t2)}
.btn-ghost:hover{border-color:var(--gr1);color:var(--gr1)}
.btn-next{background:var(--gr1);border-color:var(--gr1);color:#0a0f0a;box-shadow:0 4px 16px rgba(0,230,118,.3)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,230,118,.5)}
.btn-done{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.4);color:var(--gr1)}
.btn-done:hover{background:rgba(0,230,118,.18)}
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:22px 0 10px;display:block;font-family:var(--mono)}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid rgba(0,230,118,.2);color:var(--t3);font-family:var(--mono)}
.cfx{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;opacity:0;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(600px) rotate(540deg)}}
</style>
<script>
// ─── Auth Guard ─────────────────────────────────────────────────
const AUTH_SESSION_KEY='py_session';
(function(){
  try{
    const s=JSON.parse(sessionStorage.getItem(AUTH_SESSION_KEY));
    if(!s||Date.now()-s.loginTime>8*60*60*1000){window.location.href='login.html';return;}
    document.addEventListener('DOMContentLoaded',()=>{
      const bar=document.getElementById('course-auth-bar');
      if(!bar)return;
      const isAdmin=s.role==='admin';
      bar.innerHTML=`
        <div style="display:flex;align-items:center;gap:12px">
          <a href="index.html" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:#f1f5fd;font-size:13px;font-weight:600">← Dashboard</a>
          ${isAdmin?'<a href="admin.html" style="padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;color:#8b5cf6;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);text-decoration:none">🛡️ Admin</a>':''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;align-items:center;gap:7px;padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px">
            <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#818cf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${s.name.charAt(0).toUpperCase()}</div>
            <span style="font-size:12px;font-weight:500;color:#8899bb">${s.name}</span>
          </div>
          <button onclick="sessionStorage.removeItem('py_session');window.location.href='login.html'" style="padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;color:#f43f5e;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);cursor:pointer;font-family:inherit">Sign Out</button>
        </div>`;
    });
  }catch(e){window.location.href='login.html';}
})();
</script>
</head>

ss="de">soup</span> <span class="op">=</span> <span class="fn">BeautifulSoup</span>(<span class="de">resp</span><span class="pu">.</span><span class="de">text</span><span class="pu">,</span> <span class="st">"lxml"</span>)`,``,`            <span class="kw">for</span> <span class="de">card</span> <span class="kw">in</span> <span class="de">soup</span><span class="pu">.</span><span class="fn">select</span>(<span class="st">".product-card"</span>)<span class="pu">:</span>`,`                <span class="de">products</span><span class="pu">.</span><span class="fn">append</span>({`,`                    <span class="st">"name"</span><span class="pu">:</span>  <span class="de">card</span><span class="pu">.</span><span class="fn">select_one</span>(<span class="st">"h2"</span>)<span class="pu">.</span><span class="de">text</span><span class="pu">.</span><span class="fn">strip</span>()<span class="pu">,</span>`,`                    <span class="st">"price"</span><span class="pu">:</span> <span class="de">card</span><span class="pu">.</span><span class="fn">select_one</span>(<span class="st">".price"</span>)<span class="pu">.</span><span class="de">text</span><span class="pu">,</span>`,`                    <span class="st">"img"</span><span class="pu">:</span>   <span class="de">card</span><span class="pu">.</span><span class="fn">select_one</span>(<span class="st">"img"</span>)[<span class="st">"src"</span>]<span class="pu">,</span>`,`                })`,`        <span class="kw">except</span> <span class="de">requests</span><span class="pu">.</span><span class="de">RequestException</span> <span class="kw">as</span> <span class="de">e</span><span class="pu">:</span>`,`            <span class="bi">print</span>(<span class="st">f"Page </span><span class="op">{</span><span class="de">page</span><span class="op">}</span><span class="st"> failed: </span><span class="op">{</span><span class="de">e</span><span class="op">}</span><span class="st">"</span>)`,`        <span class="kw">f let cur=0,done=new Set();
function buildSB(){
  document.getElementById('sb').innerHTML='<div class="sb-sec">8 Application Projects</div>'+
    M.map((m,i)=>`<div class="sb-item${i===0?' active':''}${done.has(i)?' done':''}" onclick="go(${i})" style="animation-delay:${i*.05}s"><span class="sb-num">0${i+1}</span><span class="sb-dot"></span>${m.t}</div>`).join('');
}
function render(idx){
  const m=M[idx];
  const ph=m.proj?`<div class="project-hero"><div class="project-label">${m.proj.label}</div><div class="project-name">${m.proj.name}</div><div class="project-stack">${m.proj.stack}</div><div class="project-desc">${m.proj.desc}</div></div>`:'';
  document.getElementById('area').innerHTML=`<div class="lesson">
    ${ph}
    <div class="mit-badge ${m.b}">${m.bi} ${m.bt}</div>
    <h1 class="lesson-title">${m.t}</h1>
    <p class="lesson-desc">${m.d||''}</p>
    <span class="slabel">Core Concepts</span>
    <div class="concept-row">${m.concepts.map(c=>`<div class="c-card"><div class="c-icon">${c.i}</div><div class="c-name">${c.n}</div><div class="c-desc">${c.d}</div></div>`).join('')}</div>
    <span class="slabel">Production Code</span>
    <div class="code-wrap">
      <div class="code-top"><div class="code-dots"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div></div><span class="code-lang">python · project code</span><button class="copy-btn" onclick="copyC(this)">copy</button></div>
      <div class="code-body">${m.code.map((ln,i)=>`<span class="cl" style="animation-delay:${i*.05}s">${ln||'&nbsp;'}</span>`).join('\n')}</div>
    </div>
    ${m.viz}
    <div class="tip"><strong>💡 Production Tip</strong>${m.tip}</div>
    <span class="slabel">Knowledge Check</span>
    <div class="quiz-wrap">
      <div class="quiz-q">${m.quiz.q}</div>
      <div class="quiz-opts" id="qo">${m.quiz.opts.map((o,i)=>`<button class="q-opt" onclick="ans(${i},${m.quiz.c})">${o}</button>`).join('')}</div>
      <div class="quiz-fb" id="qf"></div>
    </div>
    <div class="nav-footer">
      ${idx>0?`<button class="btn btn-ghost" onclick="go(${idx-1})">← Previous</button>`:''}
      <button class="btn btn-done" onclick="markDone(${idx})">✓ Mark Done</button>
      ${idx<M.length-1?`<button class="btn btn-next" onclick="go(${idx+1})">Next Project →</button>`:`<button class="btn btn-next" onclick="celebrate()">🚀 All 4 Courses Complete!</button>`}
    </div>
  </div>`;
}
function go(idx){cur=idx;render(idx);document.querySelectorAll('.sb-item').forEach((el,i)=>el.classList.toggle('active',i===idx));document.querySelector('.main').scrollTo(0,0);upProg();}
function ans(ch,co){document.querySelectorAll('.q-opt').forEach((o,i)=>{o.disabled=true;if(i===co)o.classList.add('correct');else if(i===ch&&ch!==co)o.classList.add('wrong');});const fb=document.getElementById('qf');fb.className='quiz-fb show '+(ch===co?'ok':'fail');fb.textContent=M[cur].quiz.fb;if(ch===co)cfx();}
function markDone(idx){done.add(idx);document.querySelectorAll('.sb-item')[idx].classList.add('done');upProg();if(idx<M.length-1)go(idx+1);}
function upProg(){const p=Math.round(done.size/M.length*100);document.getElementById('fill').style.width=p+'%';document.getElementById('pct').textContent=p+'%';}
function copyC(btn){const t=btn.closest('.code-wrap').querySelector('.code-body').innerText;navigator.clipboard.writeText(t).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',1500);});}
function cfx(){const cols=['#00e676','#69f0ae','#00e5ff','#ffab00','#2979ff'];const c=document.getElementById('cfx');for(let i=0;i<60;i++){const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'3px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*.5}s;animation-duration:${1+Math.random()}s`;c.appendChild(p);setTimeout(()=>p.remove(),2500);}};
function celebrate(){cfx();setTimeout(cfx,600);setTimeout(cfx,1200);setTimeout(cfx,1800);alert('🚀 ALL 4 PYTHON COURSES COMPLETE!\n\n🐣 Beginner — Variables, Loops, Functions, Data Structures\n⚡ Intermediate — OOP, Comprehensions, Decorators, Modules\n∞ Advanced — Generators, Async, Metaclasses, Testing\n🚀 Applications — API, ML, Bots, Automation, Docker\n\nYou are now a Python developer. Build something great!');}
document.head.insertAdjacentHTML('beforeend','<style>.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:22px 0 10px;display:block;font-family:var(--mono)}</style>');
buildSB();go(0);
</script>
