<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Python Crash Course</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b12;--card:#0e1420;--border:#1c2333;--border2:#2a3548;
  --accent:#4f8ef7;--accent2:#3a7aee;--success:#10b981;--error:#f43f5e;
  --tx:#f1f5fd;--t2:#8899bb;--t3:#3d4f6b;
  --mono:'JetBrains Mono',monospace;--font:'DM Sans',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ── Animated background ── */
.bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(79,142,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.04) 1px,transparent 1px);background-size:60px 60px;animation:gridShift 20s linear infinite}
@keyframes gridShift{from{transform:translate(0,0)}to{transform:translate(60px,60px)}}
.bg-orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbFloat ease-in-out infinite}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(79,142,247,.12),transparent 70%);top:-200px;right:-100px;animation-duration:15s}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,.1),transparent 70%);bottom:-100px;left:-50px;animation-duration:20s;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.05)}}

/* ── Brand header ── */
.brand{position:fixed;top:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:10;animation:fadeDown .5s ease}
@keyframes fadeDown{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#818cf8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 16px rgba(79,142,247,.3)}
.brand-name{font-size:14px;font-weight:700;color:var(--tx)}
.brand-tag{font-size:11px;color:var(--t3);font-family:var(--mono)}

/* ── Card ── */
.card-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px;animation:cardUp .6s cubic-bezier(.4,0,.2,1)}
@keyframes cardUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,.4),0 0 0 1px rgba(79,142,247,.05);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,142,247,.4),transparent)}

.card-title{font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.card-sub{font-size:14px;color:var(--t2);margin-bottom:32px;line-height:1.5}

/* ── Form ── */
.field{margin-bottom:18px}
label{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.input-wrap{position:relative}
input{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border2);border-radius:10px;padding:13px 16px;font-size:14px;color:var(--tx);font-family:var(--font);transition:all .2s;outline:none}
input::placeholder{color:var(--t3)}
input:focus{border-color:var(--accent);background:rgba(79,142,247,.05);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
input.err{border-color:var(--error);box-shadow:0 0 0 3px rgba(244,63,94,.1)}
input.ok{border-color:var(--success);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;transition:color .2s;padding:2px}
.eye-btn:hover{color:var(--t2)}
.pw-wrap input{padding-right:44px}

/* ── Error message ── */
.err-msg{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--error);display:none;margin-bottom:16px;animation:shake .4s ease}
.err-msg.show{display:flex;align-items:center;gap:8px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ── Submit ── */
.btn-submit{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:all .25s;font-family:var(--font);position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(79,142,247,.3);margin-top:8px}
.btn-submit:hover:not(:disabled){background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,142,247,.4)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-submit .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.btn-submit.loading .btn-text{display:none}
.btn-submit.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Divider ── */
.divider{display:flex;align-items:center;gap:12px;margin:24px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:11px;color:var(--t3);white-space:nowrap}

/* ── Credentials hint ── */
.creds-box{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);border-radius:10px;padding:14px}
.creds-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cred-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cred-row:last-child{margin-bottom:0}
.cred-user{font-family:var(--mono);font-size:12px;color:var(--tx)}
.cred-role{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:var(--mono)}
.role-admin{background:rgba(244,63,94,.12);color:#f43f5e}
.role-student{background:rgba(16,185,129,.1);color:var(--success)}
.use-cred{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:var(--mono);transition:color .2s}
.use-cred:hover{color:#fff;text-decoration:underline}

/* ── Footer ── */
.card-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--t3)}

/* ── Success animation ── */
.success-overlay{position:absolute;inset:0;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;border-radius:20px}
.success-overlay.show{opacity:1;pointer-events:all}
.success-circle{width:64px;height:64px;border-radius:50%;background:rgba(16,185,129,.15);border:2px solid var(--success);display:flex;align-items:center;justify-content:center;font-size:28px;animation:popIn .5s cubic-bezier(.4,0,.2,1)}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.success-text{font-size:16px;font-weight:700;color:var(--success)}
.success-sub{font-size:13px;color:var(--t2)}
</style>
</head>
<body>
<div class="bg-wrap">
  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
</div>

<div class="brand">
  <div class="brand-icon">🐍</div>
  <div>
    <div class="brand-name">Python Crash Course</div>
    <div class="brand-tag">MIT Method · 4 Tracks</div>
  </div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="success-overlay" id="successOverlay">
      <div class="success-circle">✓</div>
      <div class="success-text">Welcome back!</div>
      <div class="success-sub" id="successName">Redirecting…</div>
    </div>

    <h1 class="card-title">Sign in</h1>
    <p class="card-sub">Access your Python learning dashboard</p>

    <div class="err-msg" id="errMsg">
      <span>⚠</span><span id="errText">Invalid username or password</span>
    </div>

    <div class="field">
      <label for="uname">Username</label>
      <div class="input-wrap">
        <input type="text" id="uname" placeholder="Enter your username" autocomplete="username" spellcheck="false">
      </div>
    </div>

    <div class="field">
      <label for="pw">
        Password
        <span style="font-size:11px;color:var(--t3);text-transform:none;font-weight:400">case‑sensitive</span>
      </label>
      <div class="input-wrap pw-wrap">
        <input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password">
        <button class="eye-btn" id="eyeBtn" type="button" onclick="togglePw()" title="Show/hide password">👁</button>
      </div>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">Sign In</span>
      <div class="spinner"></div>
    </button>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">Default Credentials</div><div class="divider-line"></div></div>

    <div class="creds-box">
      <div class="creds-label">🔑 First-time access</div>
      <div class="cred-row">
        <span class="cred-user">admin</span>
        <span class="cred-role role-admin">Admin</span>
        <button class="use-cred" onclick="fillCred('admin','Admin@2025')">use →</button>
      </div>
      <div class="cred-row">
        <span class="cred-user">student</span>
        <span class="cred-role role-student">Student</span>
        <button class="use-cred" onclick="fillCred('student','Learn@2025')">use →</button>
      </div>
    </div>

    <div class="card-footer">Admin can add & manage users after login</div>
  </div>
</div>

<script>
const AUTH_USERS_KEY='py_users', AUTH_SESSION_KEY='py_session';

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str+'py_salt_2025'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getUsers(){try{return JSON.parse(localStorage.getItem(AUTH_USERS_KEY))||[];}catch{return[];}}
function saveUsers(u){localStorage.setItem(AUTH_USERS_KEY,JSON.stringify(u));}

async function initDefaults(){
  if(getUsers().length===0){
    const users=[
      {username:'admin',passwordHash:await sha256('Admin@2025'),role:'admin',name:'Administrator',email:'admin@pycourse.com',created:new Date().toISOString(),active:true,lastLogin:null},
      {username:'student',passwordHash:await sha256('Learn@2025'),role:'student',name:'Demo Student',email:'student@pycourse.com',created:new Date().toISOString(),active:true,lastLogin:null},
    ];
    saveUsers(users);
  }
}

// if already logged in, redirect
(function(){
  try{
    const s=JSON.parse(sessionStorage.getItem(AUTH_SESSION_KEY));
    if(s&&Date.now()-s.loginTime<8*60*60*1000)window.location.href='index.html';
  }catch{}
})();

initDefaults();

function fillCred(u,p){
  document.getElementById('uname').value=u;
  document.getElementById('pw').value=p;
  document.getElementById('uname').classList.add('ok');
  document.getElementById('pw').classList.add('ok');
}

function togglePw(){
  const pw=document.getElementById('pw');
  const eye=document.getElementById('eyeBtn');
  pw.type=pw.type==='password'?'text':'password';
  eye.textContent=pw.type==='password'?'👁':'🙈';
}

function showErr(msg){
  const e=document.getElementById('errMsg');
  document.getElementById('errText').textContent=msg;
  e.classList.add('show');
  document.getElementById('uname').classList.add('err');
  document.getElementById('pw').classList.add('err');
  setTimeout(()=>{e.classList.remove('show');document.getElementById('uname').classList.remove('err');document.getElementById('pw').classList.remove('err');},4000);
}

async function doLogin(){
  const btn=document.getElementById('loginBtn');
  const u=document.getElementById('uname').value.trim();
  const p=document.getElementById('pw').value;
  if(!u||!p){showErr('Please enter both username and password.');return;}
  btn.disabled=true;btn.classList.add('loading');
  await new Promise(r=>setTimeout(r,600));
  const users=getUsers();
  const h=await sha256(p);
  const user=users.find(x=>x.username.toLowerCase()===u.toLowerCase()&&x.passwordHash===h&&x.active);
  if(!user){
    btn.disabled=false;btn.classList.remove('loading');
    showErr('Incorrect username or password. Please try again.');
    return;
  }
  // update last login
  user.lastLogin=new Date().toISOString();
  saveUsers(users);
  const session={username:user.username,role:user.role,name:user.name,token:Math.random().toString(36).slice(2),loginTime:Date.now()};
  sessionStorage.setItem(AUTH_SESSION_KEY,JSON.stringify(session));
  // show success
  document.getElementById('successName').textContent='Welcome, '+user.name+'!';
  document.getElementById('successOverlay').classList.add('show');
  btn.disabled=false;btn.classList.remove('loading');
  setTimeout(()=>window.location.href='index.html',1200);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
