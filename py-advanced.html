<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04000f;--s1:#080020;--s2:#0d0030;--neo:#b400ff;--ne2:#7c00cc;--cy:#00ffee;--gr:#00ff88;--rd:#ff2d55;--yw:#ffdd00;--tx:#eeeeff;--t2:#8877bb;--t3:#44336a;--mono:'Space Mono',monospace;--font:'Outfit',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* Particle canvas */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Scanlines effect */
.scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}

.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.topbar{height:62px;background:rgba(4,0,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(180,0,255,.2);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neo),transparent);animation:scanH 4s ease-in-out infinite}
@keyframes scanH{0%,100%{opacity:.3}50%{opacity:1}}
.logo{display:flex;align-items:center;gap:14px}
.logo-badge{width:38px;height:38px;border:2px solid var(--neo);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--neo);box-shadow:0 0 16px rgba(180,0,255,.5),inset 0 0 12px rgba(180,0,255,.1);animation:glitch 8s infinite}
@keyframes glitch{0%,95%,100%{transform:translate(0)}96%{transform:translate(-2px,1px)}97%{transform:translate(2px,-1px)}98%{transform:translate(-1px,2px)}}
.logo-name{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--neo);text-shadow:0 0 12px rgba(180,0,255,.6)}
.logo-track{font-size:11px;color:var(--t3);font-family:var(--mono)}
.prog-wrap{display:flex;align-items:center;gap:12px}
.prog-pct{font-family:var(--mono);font-size:13px;color:var(--neo)}
.prog-bar{width:160px;height:4px;background:rgba(180,0,255,.1);border-radius:2px;border:1px solid rgba(180,0,255,.2);overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ne2),var(--neo),var(--cy));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;box-shadow:0 0 10px rgba(180,0,255,.6)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:rgba(4,0,15,.9);backdrop-filter:blur(16px);border-right:1px solid rgba(180,0,255,.12);overflow-y:auto;flex-shrink:0;padding:12px 0}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);padding:10px 20px;font-family:var(--mono)}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;font-size:13px;font-weight:500;color:var(--t2);opacity:0;animation:fadeIn .5s ease forwards}
@keyframes fadeIn{to{opacity:1}}
.sb-item:hover{background:rgba(180,0,255,.07);color:var(--tx)}
.sb-item.active{background:rgba(180,0,255,.1);border-left-color:var(--neo);color:var(--neo);text-shadow:0 0 8px rgba(180,0,255,.4)}
.sb-item.done .sb-dot{background:var(--gr);box-shadow:0 0 8px var(--gr)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0;transition:all .3s}
.sb-num{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:22px}
.main{flex:1;overflow-y:auto}
.lesson{padding:40px 48px;max-width:880px;animation:glitchIn .4s cubic-bezier(.4,0,.2,1)}
@keyframes glitchIn{0%{opacity:0;transform:translateX(10px)}20%{opacity:.5;transform:translateX(-3px)}40%{opacity:.8;transform:translateX(2px)}100%{opacity:1;transform:translateX(0)}}
.mit-badge{display:inline-flex;align-items:center;gap:8px;padding:4px 14px;border-radius:2px;font-size:11px;font-weight:700;border:1px solid;margin-bottom:16px;font-family:var(--mono);letter-spacing:.05em}
.b-live{background:rgba(0,255,238,.06);color:var(--cy);border-color:rgba(0,255,238,.3)}
.b-scaffold{background:rgba(255,221,0,.06);color:var(--yw);border-color:rgba(255,221,0,.3)}
.b-flip{background:rgba(0,255,136,.06);color:var(--gr);border-color:rgba(0,255,136,.3)}
.b-real{background:rgba(255,45,85,.06);color:var(--rd);border-color:rgba(255,45,85,.3)}
.lesson-title{font-family:var(--mono);font-size:28px;font-weight:700;margin-bottom:8px;color:var(--tx);line-height:1.2}
.lesson-title .hl{color:var(--neo);text-shadow:0 0 10px rgba(180,0,255,.5)}
.lesson-desc{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:28px;max-width:640px}
.concept-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px;margin:16px 0}
.c-card{background:rgba(255,255,255,.02);border:1px solid rgba(180,0,255,.15);border-radius:4px;padding:14px;transition:all .2s;position:relative;overflow:hidden}
.c-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neo),transparent);opacity:0;transition:opacity .3s}
.c-card:hover{background:rgba(180,0,255,.07);border-color:rgba(180,0,255,.4);transform:translateY(-2px)}
.c-card:hover::before{opacity:1}
.c-icon{font-size:22px;margin-bottom:6px}
.c-name{font-size:12px;font-weight:700;color:var(--neo);margin-bottom:3px;font-family:var(--mono)}
.c-desc{font-size:12px;color:var(--t2);line-height:1.5}
.code-wrap{background:#020008;border:1px solid rgba(180,0,255,.25);border-radius:6px;overflow:hidden;margin:20px 0;box-shadow:0 0 40px rgba(180,0,255,.08),0 8px 32px rgba(0,0,0,.6);position:relative}
.code-wrap::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(180deg,var(--neo),var(--cy));opacity:.6}
.code-top{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 10px 20px;background:rgba(180,0,255,.06);border-bottom:1px solid rgba(180,0,255,.15)}
.code-dots{display:flex;gap:6px}
.cd{width:10px;height:10px;border-radius:50%}
.cd-r{background:#ff5f57}.cd-y{background:#ffbd2e}.cd-g{background:#28c840}
.code-lang{font-family:var(--mono);font-size:11px;color:var(--neo)}
.copy-btn{background:none;border:1px solid rgba(180,0,255,.25);color:var(--t3);font-size:11px;padding:3px 10px;border-radius:3px;cursor:pointer;font-family:var(--mono);transition:all .2s}
.copy-btn:hover{border-color:var(--neo);color:var(--neo);box-shadow:0 0 8px rgba(180,0,255,.3)}
.code-body{padding:20px 20px 20px 24px;font-family:var(--mono);font-size:13px;line-height:2;overflow-x:auto}
.cl{display:block;opacity:0;animation:lineGlow .4s ease forwards}
@keyframes lineGlow{from{opacity:0;color:var(--neo)}to{opacity:1}}
.kw{color:#d97aff;font-weight:700}.fn{color:#00ffee}.st{color:#00ff88}.cm{color:#3a2260;font-style:italic}.nm{color:#ffdd00}.bi{color:#ff9f43}.op{color:#ff2d55}.pu{color:#aabbcc}.de{color:#b3d4ff}.sp{color:#ff79c6}
.viz{background:rgba(180,0,255,.03);border:1px solid rgba(180,0,255,.12);border-radius:6px;padding:20px;margin:20px 0;position:relative}
.viz-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:14px;font-family:var(--mono)}
.quiz-wrap{background:rgba(180,0,255,.04);border:1px solid rgba(180,0,255,.18);border-radius:6px;padding:22px;margin:22px 0}
.quiz-q{font-size:14px;font-weight:600;margin-bottom:16px;line-height:1.6;color:var(--tx)}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{padding:11px 16px;border:1px solid rgba(180,0,255,.18);border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);background:rgba(0,0,0,.3);transition:all .2s;text-align:left;font-family:var(--font)}
.q-opt:hover:not(:disabled){border-color:var(--neo);color:var(--tx);background:rgba(180,0,255,.08);text-shadow:0 0 6px rgba(180,0,255,.3)}
.q-opt.correct{border-color:var(--gr)!important;background:rgba(0,255,136,.07)!important;color:var(--gr)!important;animation:neonPop .4s ease;box-shadow:0 0 12px rgba(0,255,136,.2)}
.q-opt.wrong{border-color:var(--rd)!important;background:rgba(255,45,85,.07)!important;color:var(--rd)!important;animation:glitchShake .4s ease}
@keyframes neonPop{0%{transform:scale(.97)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes glitchShake{0%,100%{transform:translateX(0)}20%{transform:translate(-4px,1px)}50%{transform:translate(4px,-1px)}80%{transform:translate(-2px,1px)}}
.quiz-fb{display:none;margin-top:12px;padding:12px 16px;border-radius:4px;font-size:13px;line-height:1.6;font-weight:500;font-family:var(--mono)}
.quiz-fb.show{display:block;animation:glitchIn .3s ease}
.quiz-fb.ok{background:rgba(0,255,136,.07);color:var(--gr);border:1px solid rgba(0,255,136,.25)}
.quiz-fb.fail{background:rgba(255,45,85,.07);color:var(--rd);border:1px solid rgba(255,45,85,.25)}
.tip{border-left:2px solid var(--neo);background:rgba(180,0,255,.05);padding:14px 18px;margin:20px 0;font-size:13px;color:var(--t2);line-height:1.7;position:relative;overflow:hidden}
.tip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--neo),transparent)}
.tip strong{color:var(--neo);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-family:var(--mono)}
.nav-footer{display:flex;gap:12px;margin-top:32px;padding-top:22px;border-top:1px solid rgba(180,0,255,.1)}
.btn{padding:10px 22px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all .2s;font-family:var(--font)}
.btn-ghost{border-color:rgba(180,0,255,.2);background:none;color:var(--t2)}
.btn-ghost:hover{border-color:var(--neo);color:var(--neo)}
.btn-next{background:rgba(180,0,255,.15);border-color:var(--neo);color:var(--neo);box-shadow:0 0 16px rgba(180,0,255,.2);font-family:var(--mono)}
.btn-next:hover{background:rgba(180,0,255,.25);box-shadow:0 0 28px rgba(180,0,255,.5);transform:translateY(-2px)}
.btn-done{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.4);color:var(--gr);font-family:var(--mono)}
.btn-done:hover{background:rgba(0,255,136,.15)}
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin:22px 0 10px;display:block;font-family:var(--mono)}
.cfx{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;opacity:0;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(600px) rotate(540deg)}}
</style>

// ─── Auth Guard ─────────────────────────────────────────────────
const AUTH_SESSION_KEY='py_session';
(function(){
  try{
    const s=JSON.parse(sessionStorage.getItem(AUTH_SESSION_KEY));
    if(!s||Date.now()-s.loginTime>8*60*60*1000){window.location.href='login.html';return;}
    document.addEventListener('DOMContentLoaded',()=>{
      const bar=document.getElementById('course-auth-bar');
      if(!bar)return;
      const isAdmin=s.role==='admin';
      bar.innerHTML=`
        <div style="display:flex;align-items:center;gap:12px">
          <a href="index.html" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:#f1f5fd;font-size:13px;font-weight:600">← Dashboard</a>
          ${isAdmin?'<a href="admin.html" style="padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;color:#8b5cf6;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);text-decoration:none">🛡️ Admin</a>':''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;align-items:center;gap:7px;padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px">
            <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#818cf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${s.name.charAt(0).toUpperCase()}</div>
            <span style="font-size:12px;font-weight:500;color:#8899bb">${s.name}</span>
          </div>
          <button onclick="sessionStorage.removeItem('py_session');window.location.href='login.html'" style="padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;color:#f43f5e;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);cursor:pointer;font-family:inherit">Sign Out</button>
        </div>`;
    });
  }catch(e){window.location.href='login.html';}
})();
</script>

<script>
// Particle system
(function(){
  const c=document.getElementById('particles');
  const ctx=c.getContext('2d');
  let W,H,particles=[];
  function resize(){c.width=W=window.innerWidth;c.height=H=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<80;i++)particles.push({x:Math.random()*2000,y:Math.random()*1200,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,size:Math.random()*1.5+.5,alpha:Math.random()*.4+.1,color:Math.random()>.5?'180,0,255':'0,255,238'});
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color},${p.alpha})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

pan class="fn">split</span>(<span class="st">","</span>)`,``,`<span class="cm"># Generator expression — lazy, memory-efficient</span>`,`<span class="de">big_sum</span> <span class="op">=</span> <span class="bi">sum</span>(<span class="de">x</span><span class="op">**</span><span class="nm">2</span> <span class="kw">for</span> <span class="de">x</span> <span class="kw">in</span> <span class="bi">range</span>(<span class="nm">10_000_000</span>))`],

{b:'b-live',bi:'🎥',bt:'Live — Egozy Method',t:'Context Managers — with Statement Internals',d:'The with statement is not magic — it is a protocol. Any class implementing __enter__ and __exit__ can be a context manager. Understanding this unlocks database connections, locks, temp files, and more.',
concepts:[{i:'🚪',n:'__enter__',d:'Called on entry. Return value is bound to the "as" variable.'},{i:'🚪',n:'__exit__',d:'Called on exit — even if exception. Receives exc info.'},{i:'🎀',n:'@contextmanager',d:'Generator-based shortcut using yield — much simpler.'},{i:'🔒',n:'Use cases',d:'File handles, DB connections, locks, timing, temp dirs.'}],
code:[`<span class="cm"># Build your own context manager — class style</span>`,`<span class="kw">class</span> <span class="fn">Timer</span><span class="pu">:</span>`,`    <span class="kw">def</span> <span class="fn">__enter__</span>(<span class="sp">self</span>)<span class="pu">:</span>`,`        <span class="kw">import</span> <span class="de">time</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">_start</span> <span class="op">=</span> <span class="de">time</span><span class="pu">.</span><span class="fn">perf_counter</span>()`,`        <span class="kw">return</span> <span class="sp">self</span>   <span class="cm"># bound to 'as t'</span>`,``,`    <span class="kw">def</span> <span class="fn">__exit__</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">exc_type</span><span class="pu">,</span> <span class="de">exc</span><span class="pu">,</span> <span class="de">tb</span>)<span class="pu">:</span>`,`        <span class="kw">import</span> <span class="de">time</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">elapsed</span> <span class="op">=</span> <span class="de">time</span><span class="pu">.</span><span class="fn">perf_counter</span>() <span class="op">-</span> <span class="sp">self</span><span class="pu">.</span><span class="de">_start</span>`,`        <span class="bi">print</span>(<span class="st">f"Elapsed: </span><span class="op">{</span><span class="sp">self</span><span class="pu">.</span><span class="de">elapsed</span><span class="pu">:</span><span class="st">.4f</span><span class="op">}</span><span class="st">s"</span>)`,``,`<span class="kw">with</span> <span class="fn">Timer</span>() <span class="kw">as</span> <span class="de">t</span><span class="pu">:</span>`,`    <span class="de">result</span> <span class="op">=</span> <span class="bi">sum</span>(<span class="bi">range</span>(<span class="nm">1_000_000</span>))`,``,`<span class="cm"># Simpler: @contextmanager decorator</span>`,`<span class="kw">from</span> <span class="de">contextlib</span> <span class="kw">import</span> <span class="de">contextmanager</span>`,``,`<span class="op">@</span><span class="de">contextmanager</span>`,`<span class="kw">def</span> <span class="fn">managed_db</span>(<span class="de">url</span>)<span class="pu">:</span>`,`    <span class="de">conn</span> <span class="op">=</span> <span class="fn">connect</span>(<span class="de">url</span>)   <span class="cm"># __enter__</span>`,`    <span class="kw">try</span><span class="pu">:</span>`,`        <span class="kw">yield</span> <span class="de">conn</span>         <span class="cm"># block runs here</span>`,`    <span class="kw">finally</span><span class="pu">:</span>`,`        <span class="de">conn</span><span class="pu">.</span><span class="fn">close</span>()      <span class="cm"># __exit__</span>`],
viz:`<div class="viz"><div class="viz-title">Context Manager Protocol — execution order</div><div style="font-family:var(--mono);font-size:12px;line-height:2"><div style="color:var(--neo)">with Timer() as t:</div><div style="margin-left:20px;color:var(--t3)">1. Timer().__enter__() called → returns self → bound to t</div><div style="margin-left:20px;color:var(--cy)">2. &lt;your code block runs&gt;</div><div style="margin-left:20px;color:var(--t3)">3. Timer().__exit__(None, None, None) called on clean exit</div><div style="margin-left:20px;color:var(--rd)">3. Timer().__exit__(exc_type, exc, tb) called if exception</div><div style="margin-left:40px;color:var(--yw)">→ return True to suppress exception; False to re-raise</div></div></div>`,
tip:'__exit__ receives exception info. Return True to suppress the exception (risky). Return False or None to let it propagate. Most context managers return None — they clean up but do not swallow errors.',
quiz:{q:'In a `@contextmanager` function, where does the `with` block\'s code run?',opts:['Before the yield','After the yield','In place of the yield — the yield is where the with block executes','In a separate thread'],c:2,fb:'✅ Everything before yield is __enter__. The yield pauses the generator. The with block runs. Then execution resumes after yield (the __exit__ part). This is an elegant use of generators for resource management.'}},

{b:'b-scaffold',bi:'🧩',bt:'Scaffolded — Bazant Method',t:'Async Programming — asyncio',d:'Async lets Python do other work while waiting for I/O. One thread, zero blocking. Critical for web scraping, API calls, and any network-heavy code.',
concepts:[{i:'🔄',n:'async def',d:'Define a coroutine — a function that can pause and resume.'},{i:'⏳',n:'await',d:'Pause this coroutine and yield control to the event loop.'},{i:'🚀',n:'asyncio.gather',d:'Run multiple coroutines concurrently — huge speedup.'},{i:'🌐',n:'aiohttp',d:'Async HTTP client — fetch URLs without blocking.'}],
code:[`<span class="kw">import</span> <span class="de">asyncio</span>`,`<span class="kw">import</span> <span class="de">aiohttp</span>`,``,`<span class="cm"># Step 1 — simple coroutine</span>`,`<span class="kw">async def</span> <span class="fn">fetch_price</span>(<span class="de">session</span><span class="pu">,</span> <span class="de">sku</span>)<span class="pu">:</span>`,`    <span class="de">url</span> <span class="op">=</span> <span class="st">f"https://api.store.com/product/</span><span class="op">{</span><span class="de">sku</span><span class="op">}</span><span class="st">"</span>`,`    <span class="kw">async with</span> <span class="de">session</span><span class="pu">.</span><span class="fn">get</span>(<span class="de">url</span>) <span class="kw">as</span> <span class="de">resp</span><span class="pu">:</span>`,`        <span class="de">data</span> <span class="op">=</span> <span class="kw">await</span> <span class="de">resp</span><span class="pu">.</span><span class="fn">json</span>()`,`        <span class="kw">return</span> <span class="de">data</span>[<span class="st">"price"</span>]`,``,`<span class="cm"># Step 2 — gather: run ALL concurrently</span>`,`<span class="kw">async def</span> <span class="fn">fetch_all_prices</span>(<span class="de">skus</span>)<span class="pu">:</span>`,`    <span class="kw">async with</span> <span class="de">aiohttp</span><span class="pu">.</span><span class="fn">ClientSession</span>() <span class="kw">as</span> <span class="de">s</span><span class="pu">:</span>`,`        <span class="de">tasks</span> <span class="op">=</span> [<span class="fn">fetch_price</span>(<span class="de">s</span><span class="pu">,</span> <span class="de">sku</span>) <span class="kw">for</span> <span class="de">sku</span> <span class="kw">in</span> <span class="de">skus</span>]`,`        <span class="kw">return</span> <span class="kw">await</span> <span class="de">asyncio</span><span class="pu">.</span><span class="fn">gather</span>(<span class="op">*</span><span class="de">tasks</span>)`,``,`<span class="cm"># Run: 50 concurrent requests instead of sequential</span>`,`<span class="de">prices</span> <span class="op">=</span> <span class="de">asyncio</span><span class="pu">.</span><span class="fn">run</span>(<span class="fn">fetch_all_prices</span>(<span class="de">sku_list</span>))`],
viz:`<div class="viz"><div class="viz-title">Sequential vs Concurrent I/O — 5 requests × 1 second each</div><div style="margin-bottom:12px"><div style="font-size:11px;color:var(--rd);font-family:var(--mono);margin-bottom:6px">Sequential (sync) — 5 seconds total</div><div style="display:flex;gap:4px">${[1,2,3,4,5].map(i=>`<div style="width:60px;height:28px;background:rgba(255,45,85,.15);border:1px solid rgba(255,45,85,.3);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--rd);font-family:var(--mono)">req ${i}</div>`).join('<div style="width:4px;height:28px;background:rgba(255,45,85,.1)"></div>')}</div></div><div><div style="font-size:11px;color:var(--gr);font-family:var(--mono);margin-bottom:6px">Concurrent (async) — ~1 second total</div><div style="display:flex;gap:4px">${[1,2,3,4,5].map(i=>`<div style="width:60px;height:28px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gr);font-family:var(--mono)">req ${i}</div>`).join('')}</div><div style="font-size:11px;color:var(--t3);margin-top:6px">All requests run simultaneously — waiting does not block others</div></div></div>`,
tip:'asyncio is for I/O-bound concurrency. For CPU-bound work (number crunching, image processing), use multiprocessing instead — the GIL prevents true thread parallelism for CPU work.',
quiz:{q:'`asyncio.gather(*tasks)` runs 10 coroutines. What does this achieve?',opts:['Runs them one after another in order','Starts all 10 concurrently — while one awaits I/O, others make progress','Creates 10 threads','Only runs 4 at a time (CPU core limit)'],c:1,fb:'✅ gather() schedules all coroutines on the event loop simultaneously. While coroutine 1 awaits a network response, coroutines 2-10 can make progress. Result: 10x faster than sequential for I/O-bound work.'}},

{b:'b-live',bi:'🎥',bt:'Live — Egozy Method',t:'Metaclasses & Class Internals',d:'Classes are objects too. Metaclasses are classes that create classes — they let you hook into class creation, enforce patterns, add methods automatically, or build ORMs and frameworks.',
concepts:[{i:'🔬',n:'type()',d:'The default metaclass. type("Name", bases, dict) creates a class.'},{i:'🏭',n:'__new__ vs __init__',d:'__new__ creates the instance; __init__ initializes it.'},{i:'📐',n:'Custom metaclass',d:'class Meta(type): lets you intercept class creation.'},{i:'🔑',n:'__class_getitem__',d:'Powers generics: list[int], dict[str, int].'}],
code:[`<span class="cm"># type() is the metaclass of all classes</span>`,`<span class="bi">print</span>(<span class="bi">type</span>(<span class="bi">int</span>))      <span class="cm"># &lt;class 'type'&gt;</span>`,`<span class="bi">print</span>(<span class="bi">type</span>(<span class="bi">type</span>))     <span class="cm"># &lt;class 'type'&gt; — self-referential!</span>`,``,`<span class="cm"># Create a class dynamically with type()</span>`,`<span class="de">Dog</span> <span class="op">=</span> <span class="bi">type</span>(<span class="st">"Dog"</span><span class="pu">,</span> (<span class="bi">object</span><span class="pu">,</span>)<span class="pu">,</span> {`,`    <span class="st">"speak"</span><span class="pu">:</span> <span class="kw">lambda</span> <span class="sp">self</span><span class="pu">:</span> <span class="st">"Woof!"</span>`,`})`,`<span class="bi">print</span>(<span class="fn">Dog</span>()<span class="pu">.</span><span class="fn">speak</span>())   <span class="cm"># Woof!</span>`,``,`<span class="cm"># Metaclass — enforces ALL methods are documented</span>`,`<span class="kw">class</span> <span class="fn">RequireDocstrings</span>(<span class="bi">type</span>)<span class="pu">:</span>`,`    <span class="kw">def</span> <span class="fn">__new__</span>(<span class="sp">mcs</span><span class="pu">,</span> <span class="de">name</span><span class="pu">,</span> <span class="de">bases</span><span class="pu">,</span> <span class="de">namespace</span>)<span class="pu">:</span>`,`        <span class="kw">for</span> <span class="de">k</span><span class="pu">,</span><span class="de">v</span> <span class="kw">in</span> <span class="de">namespace</span><span class="pu">.</span><span class="fn">items</span>()<span class="pu">:</span>`,`            <span class="kw">if</span> <span class="bi">callable</span>(<span class="de">v</span>) <span class="kw">and not</span> <span class="de">v</span><span class="pu">.</span><span class="de">__doc__</span><span class="pu">:</span>`,`                <span class="kw">raise</span> <span class="bi">TypeError</span>(<span class="st">f"</span><span class="op">{</span><span class="de">k</span><span class="op">}</span><span class="st"> needs a docstring"</span>)`,`        <span class="kw">return</span> <span class="bi">super</span>()<span class="pu">.</span><span class="fn">__new__</span>(<span class="sp">mcs</span><span class="pu">,</span><span class="de">name</span><span class="pu">,</span><span class="de">bases</span><span class="pu">,</span><span class="de">namespace</span>)`],
viz:`<div class="viz"><div class="viz-title">Python object hierarchy</div><div style="text-align:center;font-family:var(--mono);font-size:12px;line-height:1"><div style="display:inline-block;padding:6px 18px;background:rgba(180,0,255,.15);border:1px solid var(--neo);border-radius:3px;color:var(--neo);margin:4px">type (metaclass)</div><div style="color:var(--t3);margin:2px">↓ creates</div><div style="display:inline-block;padding:6px 18px;background:rgba(0,255,238,.08);border:1px solid var(--cy);border-radius:3px;color:var(--cy);margin:4px">class (e.g. Product)</div><div style="color:var(--t3);margin:2px">↓ creates</div><div style="display:inline-block;padding:6px 18px;background:rgba(0,255,136,.08);border:1px solid var(--gr);border-radius:3px;color:var(--gr);margin:4px">instance (e.g. serum)</div></div></div>`,
tip:'Metaclasses are a power tool — most code never needs them. Django ORM, SQLAlchemy, dataclasses, ABC, and Pydantic all use metaclasses internally. Understanding them helps you use frameworks deeply.',
quiz:{q:'What is the metaclass of a regular Python class?',opts:['object','class','type — every class is an instance of type','meta'],c:2,fb:'✅ type is the metaclass of all classes. int, str, list, your custom classes — they are all instances of type. type(int) returns <class type>. This is Python\'s fundamental object model.'}},

{b:'b-scaffold',bi:'🧩',bt:'Scaffolded — Bazant Method',t:'Type Hints & Protocols',d:'Python 3.5+ supports optional static typing. Type hints catch bugs before runtime, power IDEs, and document intent. Protocols enable structural subtyping — duck typing made explicit.',
concepts:[{i:'🏷️',n:'Type hints',d:'def greet(name: str) -> str: — annotations for parameters and returns.'},{i:'📋',n:'typing module',d:'List[int], Dict[str,int], Optional[str], Union, Callable.'},{i:'🦆',n:'Protocol',d:'Define an interface by what methods an object has, not inheritance.'},{i:'🔍',n:'mypy / pyright',d:'Static type checkers — run separately to catch type errors.'}],
code:[`<span class="kw">from</span> <span class="de">typing</span> <span class="kw">import</span> <span class="de">Optional</span><span class="pu">,</span> <span class="de">Union</span>`,`<span class="kw">from</span> <span class="de">typing</span> <span class="kw">import</span> <span class="de">Protocol</span>`,``,`<span class="cm"># Type hints — documents intent AND enables tooling</span>`,`<span class="kw">def</span> <span class="fn">final_price</span>(`,`    <span class="de">price</span><span class="pu">:</span> <span class="bi">float</span><span class="pu">,</span>`,`    <span class="de">discount</span><span class="pu">:</span> <span class="bi">float</span> <span class="op">=</span> <span class="nm">0.0</span><span class="pu">,</span>`,`    <span class="de">label</span><span class="pu">:</span> <span class="de">Optional</span>[<span class="bi">str</span>] <span class="op">=</span> <span class="kw">None</span>`,`)<span class="pu">:</span> <span class="op">-&gt;</span> <span class="bi">float</span><span class="pu">:</span>`,`    <span class="kw">return</span> <span class="bi">round</span>(<span class="de">price</span> <span class="op">*</span> (<span class="nm">1</span> <span class="op">-</span> <span class="de">discount</span>)<span class="pu">,</span> <span class="nm">2</span>)`,``,`<span class="cm"># Protocol — structural typing (duck typing, explicit)</span>`,`<span class="kw">class</span> <span class="fn">Priceable</span>(<span class="de">Protocol</span>)<span class="pu">:</span>`,`    <span class="de">price</span><span class="pu">:</span> <span class="bi">float</span>`,`    <span class="kw">def</span> <span class="fn">sale_price</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">pct</span><span class="pu">:</span> <span class="bi">float</span>) <span class="op">-&gt;</span> <span class="bi">float</span><span class="pu">:</span> <span class="pu">...</span>`,``,`<span class="kw">def</span> <span class="fn">apply_sale</span>(<span class="de">item</span><span class="pu">:</span> <span class="de">Priceable</span><span class="pu">,</span> <span class="de">pct</span><span class="pu">:</span> <span class="bi">float</span>) <span class="op">-&gt;</span> <span class="bi">float</span><span class="pu">:</span>`,`    <span class="kw">return</span> <span class="de">item</span><span class="pu">.</span><span class="fn">sale_price</span>(<span class="de">pct</span>)`,`    <span class="cm"># works for ANY object with .price and .sale_price()</span>`],
viz:`<div class="viz"><div class="viz-title">Type hint benefits at a glance</div><div style="display:flex;flex-direction:column;gap:8px;font-size:13px">${[['🔴 Before','add(a, b) → mystery','What type is a? What is returned?','var(--t3)','rgba(255,45,85,.05)','rgba(255,45,85,.15)'],['🟢 After','add(a: int, b: int) -> int','Crystal clear. IDE autocompletes. mypy validates.','var(--gr)','rgba(0,255,136,.05)','rgba(0,255,136,.2)']].map(([lbl,sig,desc,col,bg,border])=>`<div style="padding:10px 14px;background:${bg};border:1px solid ${border};border-radius:4px"><div style="font-family:var(--mono);font-size:11px;color:${col};margin-bottom:4px">${lbl}: ${sig}</div><div style="font-size:12px;color:var(--t2)">${desc}</div></div>`).join('')}</div></div>`,
tip:'Type hints are not enforced at runtime — Python still runs untyped code. Use mypy or pyright in your CI pipeline to actually check types. Tools like Pydantic DO enforce types at runtime.',
quiz:{q:'What does `Optional[str]` mean in a type hint?',opts:['The parameter is optional (has a default)','The value can be str or None','The str is optional in some editions of Python','A string that might not be valid'],c:1,fb:"✅ Optional[str] = Union[str, None]. It means the value is either a string or None — often used for parameters that might not be provided. It does NOT mean the parameter has a default value (though often both are true)."}},

{b:'b-real',bi:'⚡',bt:'Real Data — Noe Method',t:'Concurrency — Threading & Multiprocessing',d:'Python has three concurrency models. Choosing the right one is critical — the wrong choice does not speed things up at all.',
concepts:[{i:'🧵',n:'Threading',d:'GIL-limited. Good for I/O-bound (network, disk), not CPU.'},{i:'🔧',n:'Multiprocessing',d:'Bypasses GIL. Each process gets its own Python. CPU-bound.'},{i:'⚡',n:'asyncio',d:'Single-threaded cooperative. Best for massive I/O concurrency.'},{i:'🏊',n:'ProcessPoolExecutor',d:'concurrent.futures — clean high-level API for both.'}],
code:[`<span class="kw">from</span> <span class="de">concurrent.futures</span> <span class="kw">import</span> <span class="de">ThreadPoolExecutor</span><span class="pu">,</span> <span class="de">ProcessPoolExecutor</span>`,`<span class="kw">import</span> <span class="de">requests</span>`,``,`<span class="cm"># ThreadPoolExecutor — I/O bound (HTTP requests)</span>`,`<span class="kw">def</span> <span class="fn">fetch_url</span>(<span class="de">url</span>)<span class="pu">:</span>`,`    <span class="kw">return</span> <span class="de">requests</span><span class="pu">.</span><span class="fn">get</span>(<span class="de">url</span>)<span class="pu">.</span><span class="de">status_code</span>`,``,`<span class="de">urls</span> <span class="op">=</span> [<span class="st">"https://api.example.com/product/1"</span><span class="pu">,</span> <span class="de">...</span>]`,`<span class="kw">with</span> <span class="fn">ThreadPoolExecutor</span>(<span class="de">max_workers</span><span class="op">=</span><span class="nm">20</span>) <span class="kw">as</span> <span class="de">ex</span><span class="pu">:</span>`,`    <span class="de">results</span> <span class="op">=</span> <span class="bi">list</span>(<span class="de">ex</span><span class="pu">.</span><span class="fn">map</span>(<span class="fn">fetch_url</span><span class="pu">,</span> <span class="de">urls</span>))`,``,`<span class="cm"># ProcessPoolExecutor — CPU bound (image resize)</span>`,`<span class="kw">import</span> <span class="de">math</span>`,`<span class="kw">def</span> <span class="fn">expensive_calc</span>(<span class="de">n</span>)<span class="pu">:</span>`,`    <span class="kw">return</span> <span class="bi">sum</span>(<span class="de">math</span><span class="pu">.</span><span class="fn">sqrt</span>(<span class="de">i</span>) <span class="kw">for</span> <span class="de">i</span> <span class="kw">in</span> <span class="bi">range</span>(<span class="de">n</span>))`,``,`<span class="kw">with</span> <span class="fn">ProcessPoolExecutor</span>() <span class="kw">as</span> <span class="de">ex</span><span class="pu">:</span>`,`    <span class="de">results</span> <span class="op">=</span> <span class="bi">list</span>(<span class="de">ex</span><span class="pu">.</span><span class="fn">map</span>(<span class="fn">expensive_calc</span><span class="pu">,</span> [<span class="nm">10</span><span class="op">**</span><span class="nm">6</span>]<span class="op">*</span><span class="nm">8</span>))`],
viz:`<div class="viz"><div class="viz-title">Which concurrency model to choose?</div><div style="display:flex;flex-direction:column;gap:8px">${[['I/O-bound — many small waits','asyncio > ThreadPoolExecutor','Network requests, file reads, DB queries','cy'],['CPU-bound — heavy computation','ProcessPoolExecutor (multiprocessing)','Image processing, ML inference, math','gr'],['Mixed workloads','asyncio + run_in_executor for CPU parts','Web servers, data pipelines','yw']].map(([when,use,ex,c])=>`<div style="display:flex;gap:12px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:4px;align-items:flex-start"><div style="min-width:8px;height:8px;border-radius:50%;background:var(--${c});margin-top:4px;box-shadow:0 0 6px var(--${c});flex-shrink:0"></div><div><div style="font-size:12px;color:var(--t2);margin-bottom:2px">${when}</div><div style="font-family:var(--mono);font-size:12px;color:var(--${c});margin-bottom:2px">${use}</div><div style="font-size:11px;color:var(--t3)">${ex}</div></div></div>`).join('')}</div></div>`,
tip:'The GIL (Global Interpreter Lock) prevents true thread parallelism for CPU work in CPython. For CPU-bound tasks, use multiprocessing — each process has its own Python interpreter and GIL.',
quiz:{q:'You need to scrape 500 URLs as fast as possible. What is the right approach?',opts:['multiprocessing — 500 processes','Sequential loop — simplest','asyncio with aiohttp — single thread, concurrent I/O, minimal overhead','threading with 500 threads'],c:2,fb:'✅ URL fetching is I/O-bound — the bottleneck is network latency, not CPU. asyncio handles thousands of concurrent connections in a single thread with minimal memory overhead. 500 processes would use enormous RAM; sequential would take 500x longer.'}},

{b:'b-real',bi:'⚡',bt:'Real Data — Noe Method',t:'Design Patterns in Python',d:'Design patterns are proven solutions to recurring problems. Python implements them elegantly — often with built-in language features rather than verbose class hierarchies.',
concepts:[{i:'🏭',n:'Factory',d:'Creates objects without specifying the exact class — flexible instantiation.'},{i:'👁️',n:'Observer',d:'Objects subscribe to events and get notified automatically.'},{i:'🎯',n:'Singleton',d:'Ensure only one instance exists — configs, DB connections.'},{i:'🔌',n:'Strategy',d:'Swap algorithms at runtime without changing the client code.'}],
code:[`<span class="cm"># Singleton — using __new__</span>`,`<span class="kw">class</span> <span class="fn">Config</span><span class="pu">:</span>`,`    <span class="de">_instance</span> <span class="op">=</span> <span class="kw">None</span>`,`    <span class="kw">def</span> <span class="fn">__new__</span>(<span class="sp">cls</span>)<span class="pu">:</span>`,`        <span class="kw">if</span> <span class="sp">cls</span><span class="pu">.</span><span class="de">_instance</span> <span class="kw">is</span> <span class="kw">None</span><span class="pu">:</span>`,`            <span class="sp">cls</span><span class="pu">.</span><span class="de">_instance</span> <span class="op">=</span> <span class="bi">super</span>()<span class="pu">.</span><span class="fn">__new__</span>(<span class="sp">cls</span>)`,`        <span class="kw">return</span> <span class="sp">cls</span><span class="pu">.</span><span class="de">_instance</span>`,``,`<span class="cm"># Observer — event system with callbacks</span>`,`<span class="kw">class</span> <span class="fn">EventBus</span><span class="pu">:</span>`,`    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="sp">self</span>)<span class="pu">:</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">_listeners</span> <span class="op">=</span> {}`,`    <span class="kw">def</span> <span class="fn">on</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">event</span><span class="pu">,</span> <span class="de">fn</span>)<span class="pu">:</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">_listeners</span><span class="pu">.</span><span class="fn">setdefault</span>(<span class="de">event</span><span class="pu">,</span> [])<span class="pu">.</span><span class="fn">append</span>(<span class="de">fn</span>)`,`    <span class="kw">def</span> <span class="fn">emit</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">event</span><span class="pu">,</span> <span class="op">**</span><span class="de">data</span>)<span class="pu">:</span>`,`        <span class="kw">for</span> <span class="de">fn</span> <span class="kw">in</span> <span class="sp">self</span><span class="pu">.</span><span class="de">_listeners</span><span class="pu">.</span><span class="fn">get</span>(<span class="de">event</span><span class="pu">,</span> [])<span class="pu">:</span>`,`            <span class="fn">fn</span>(<span class="op">**</span><span class="de">data</span>)`,``,`<span class="de">bus</span> <span class="op">=</span> <span class="fn">EventBus</span>()`,`<span class="de">bus</span><span class="pu">.</span><span class="fn">on</span>(<span class="st">"order_placed"</span><span class="pu">,</span> <span class="kw">lambda</span> <span class="op">**</span><span class="de">d</span><span class="pu">:</span> <span class="bi">print</span>(<span class="st">f"Email: order </span><span class="op">{</span><span class="de">d</span>[<span class="st">'id'</span>]<span class="op">}</span><span class="st">"</span>))`,`<span class="de">bus</span><span class="pu">.</span><span class="fn">emit</span>(<span class="st">"order_placed"</span><span class="pu">,</span> <span class="de">id</span><span class="op">=</span><span class="st">"ORD-1042"</span>)`],
viz:`<div class="viz"><div class="viz-title">Observer pattern — decoupled event-driven architecture</div><div style="font-family:var(--mono);font-size:12px;line-height:2;text-align:center"><div style="display:inline-block;padding:6px 16px;background:rgba(180,0,255,.1);border:1px solid var(--neo);border-radius:3px;color:var(--neo)">Order Service</div><div style="color:var(--t3)">↓ bus.emit("order_placed")</div><div style="display:flex;justify-content:center;gap:12px">${['Email Service','Inventory Service','Analytics Service'].map(s=>`<div style="padding:6px 12px;background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.25);border-radius:3px;color:var(--gr);font-size:11px">${s}</div>`).join('')}</div><div style="font-size:11px;color:var(--t3);margin-top:6px">All listeners called — Order Service knows nothing about them</div></div></div>`,
tip:'Python does not need verbose pattern implementations. The Observer pattern is just a dict of callbacks. Strategy is just passing a function. Pythonic code favors simplicity over structure.',
quiz:{q:'Why is Singleton controversial in Python?',opts:['Python does not support it','Module-level variables ARE singletons in Python — explicit Singleton classes add complexity for no benefit','Singletons are too slow','Python GC deletes singletons'],c:1,fb:'✅ Python modules are singletons by nature — imported once, cached in sys.modules. A module-level variable config = Config() is a singleton pattern with zero ceremony. Explicit Singleton classes are often unnecessary over-engineering.'}},

{b:'b-flip',bi:'🔄',bt:'Flipped — Demaine Method',t:'Testing — pytest, Mocks & Coverage',d:'Untested code is broken code you have not found yet. Understand WHY testing matters, then master pytest — the most powerful Python testing framework.',

code:[`<span class="cm"># products.py</span>`,`<span class="kw">class</span> <span class="fn">Product</span><span class="pu">:</span>`,`    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">name</span><span class="pu">,</span> <span class="de">price</span>)<span class="pu">:</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">name</span><span class="pu">,</span> <span class="sp">self</span><span class="pu">.</span><span class="de">price</span> <span class="op">=</span> <span class="de">name</span><span class="pu">,</span> <span class="de">price</span>`,`    <span class="kw">def</span> <span class="fn">sale_price</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">pct</span>)<span class="pu">:</span>`,`        <span class="kw">if</span> <span class="de">pct</span> <span class="op">&lt;</span> <span class="nm">0</span> <span class="kw">or</span> <span class="de">pct</span> <span class="op">&gt;</span> <span class="nm">100</span><span class="pu">:</span> <span class="kw">raise</span> <span class="bi">ValueError</span>`,`        <span class="kw">return</span> <span class="bi">round</span>(<span class="sp">self</span><span class="pu">.</span><span class="de">price</span><span class="op">*</span>(<span class="nm">1</span><span class="op">-</span><span class="de">pct</span><span class="op">/</span><span class="nm">100</span>)<span class="pu">,</span><span class="nm">2</span>)`,``,`<span class="cm"># test_products.py — pytest discovers these</span>`,`<span class="kw">import</span> <span class="de">pytest</span>`,``,`<span class="de">@pytest</span><span class="pu">.</span><span class="de">fixture</span>`,`<span class="kw">def</span> <span class="fn">serum</span>()<span class="pu">:</span>`,`    <span class="kw">return</span> <span class="fn">Product</span>(<span class="st">"Serum"</span><span class="pu">,</span> <span class="nm">650</span>)`,``,`<span class="kw">def</span> <span class="fn">test_sale_price</span>(<span class="de">serum</span>)<span class="pu">:</span>`,`    <span class="de">assert</span> <span class="de">serum</span><span class="pu">.</span><span class="fn">sale_price</span>(<span class="nm">20</span>) <span class="op">==</span> <span class="nm">520.0</span>`,``,`<span class="kw">def</span> <span class="fn">test_invalid_discount</span>(<span class="de">serum</span>)<span class="pu">:</span>`,`    <span class="kw">with</span> <span class="de">pytest</span><span class="pu">.</span><span class="fn">raises</span>(<span class="bi">ValueError</span>)<span class="pu">:</span>`,`        <span class="de">serum</span><span class="pu">.</span><span class="fn">sale_price</span>(<span class="op">-</span><span class="nm">5</span>)   <span class="cm"># must raise!</span>`],
viz:`<div class="viz"><div class="viz-title">pytest output — what good tests look like</div><div style="background:rgba(0,0,0,.5);border-radius:4px;padding:14px;font-family:var(--mono);font-size:12px;line-height:2"><div style="color:var(--t2)">$ pytest test_products.py -v</div><div style="color:var(--gr)">PASSED test_sale_price</div><div style="color:var(--gr)">PASSED test_invalid_discount</div><div style="color:var(--gr)">PASSED test_zero_discount</div><div style="color:var(--rd)">FAILED test_negative_price - AssertionError</div><div style="color:var(--t2);margin-top:6px">3 passed, 1 failed in 0.12s</div></div></div>`,
tip:'Test names are documentation. test_sale_price_with_20pct_discount is infinitely better than test_1. When a test fails 6 months later, the name tells you exactly what broke.',
quiz:{q:'A `@pytest.fixture` function does what?',opts:['Marks a function as a test','Provides reusable setup data or objects shared across test functions','Skips the test if a condition is met','Measures test performance'],c:1,fb:'✅ Fixtures are reusable setup code. Instead of creating a Product in every test, you define one fixture and pytest injects it wherever needed. They can also handle teardown via yield — the cleanup runs after the test.'}},

let cur=0,done=new Set();
function buildSB(){
  document.getElementById('sb').innerHTML='<div class="sb-sec">8 ADVANCED MODULES</div>'+
    M.map((m,i)=>`<div class="sb-item${i===0?' active':''}${done.has(i)?' done':''}" onclick="go(${i})" style="animation-delay:${i*.05}s"><span class="sb-num">0${i+1}</span><span class="sb-dot"></span>${m.t}</div>`).join('');
}
function render(idx){
  const m=M[idx];
  document.getElementById('area').innerHTML=`<div class="lesson">
    <div class="mit-badge ${m.b}">${m.bi} ${m.bt}</div>
    <h1 class="lesson-title">${m.t}</h1>
    <p class="lesson-desc">${m.d}</p>
    <span class="slabel">// CORE CONCEPTS</span>
    <div class="concept-row">${m.concepts.map(c=>`<div class="c-card"><div class="c-icon">${c.i}</div><div class="c-name">${c.n}</div><div class="c-desc">${c.d}</div></div>`).join('')}</div>
    <span class="slabel">// CODE</span>
    <div class="code-wrap">
      <div class="code-top"><div class="code-dots"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div></div><span class="code-lang">python // advanced</span><button class="copy-btn" onclick="copyC(this)">copy</button></div>
      <div class="code-body">${m.code.map((ln,i)=>`<span class="cl" style="animation-delay:${i*.05}s">${ln||'&nbsp;'}</span>`).join('\n')}</div>
    </div>
    ${m.viz}
    <div class="tip"><strong>// NEO-INSIGHT</strong>${m.tip}</div>
    <span class="slabel">// KNOWLEDGE CHECK</span>
    <div class="quiz-wrap">
      <div class="quiz-q">${m.quiz.q}</div>
      <div class="quiz-opts" id="qo">${m.quiz.opts.map((o,i)=>`<button class="q-opt" onclick="ans(${i},${m.quiz.c})">${o}</button>`).join('')}</div>
      <div class="quiz-fb" id="qf"></div>
    </div>
    <div class="nav-footer">
      ${idx>0?`<button class="btn btn-ghost" onclick="go(${idx-1})">← PREV</button>`:''}
      <button class="btn btn-done" onclick="markDone(${idx})">✓ DONE</button>
      ${idx<M.length-1?`<button class="btn btn-next" onclick="go(${idx+1})">NEXT →</button>`:`<button class="btn btn-next" onclick="celebrate()">// COMPLETE</button>`}
    </div>
  </div>`;
}
function go(idx){cur=idx;render(idx);document.querySelectorAll('.sb-item').forEach((el,i)=>el.classList.toggle('active',i===idx));document.querySelector('.main').scrollTo(0,0);upProg();}
function ans(ch,co){document.querySelectorAll('.q-opt').forEach((o,i)=>{o.disabled=true;if(i===co)o.classList.add('correct');else if(i===ch&&ch!==co)o.classList.add('wrong');});const fb=document.getElementById('qf');fb.className='quiz-fb show '+(ch===co?'ok':'fail');fb.textContent=M[cur].quiz.fb;if(ch===co)cfx();}
function markDone(idx){done.add(idx);document.querySelectorAll('.sb-item')[idx].classList.add('done');upProg();if(idx<M.length-1)go(idx+1);}
function upProg(){const p=Math.round(done.size/M.length*100);document.getElementById('fill').style.width=p+'%';document.getElementById('pct').textContent=p+'%';}
function copyC(btn){const t=btn.closest('.code-wrap').querySelector('.code-body').innerText;navigator.clipboard.writeText(t).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',1500);});}
function cfx(){const cols=['#b400ff','#00ffee','#00ff88','#ff2d55','#ffdd00'];const c=document.getElementById('cfx');for(let i=0;i<60;i++){const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'2px'};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;animation-delay:${Math.random()*.5}s;animation-duration:${1+Math.random()}s`;c.appendChild(p);setTimeout(()=>p.remove(),2500);}};
function celebrate(){cfx();setTimeout(cfx,700);setTimeout(cfx,1400);alert('∞ Advanced Complete!\n\n✅ Generators & Lazy Eval\n✅ Context Managers\n✅ Async/asyncio\n✅ Metaclasses\n✅ Type Hints & Protocols\n✅ Threading & Multiprocessing\n✅ Design Patterns\n✅ pytest & Testing\n\nFinal Track: Python Applications!');}
document.head.insertAdjacentHTML('beforeend','<style>.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin:22px 0 10px;display:block;font-family:var(--mono)}</style>');
buildSB();go(0);
</script>
