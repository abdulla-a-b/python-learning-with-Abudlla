<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Python Intermediate — Crash Course</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060d1a;--s1:#0a1628;--s2:#0f2040;--cy:#00d4ff;--tl:#00ffcc;--bl:#4a90d9;--vi:#8b5cf6;--pk:#f472b6;--tx:#e2f0ff;--t2:#7ea8cc;--t3:#3d6080;--mono:'JetBrains Mono',monospace;--font:'DM Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* ── Animated grid background ── */
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:40px 40px;animation:gridPulse 8s ease-in-out infinite}
@keyframes gridPulse{0%,100%{opacity:.5}50%{opacity:1}}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.08),transparent 70%);top:-100px;right:-100px;animation:glowMove 12s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes glowMove{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,60px)}}

.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.topbar{height:60px;background:rgba(6,13,26,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,212,255,.15);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:12px}
.logo-badge{width:36px;height:36px;border-radius:8px;border:2px solid var(--cy);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--cy);font-weight:700;box-shadow:0 0 12px rgba(0,212,255,.3)}
.logo-name{font-size:16px;font-weight:700;color:var(--cy)}
.logo-track{font-size:11px;color:var(--t3)}
.prog-wrap{display:flex;align-items:center;gap:12px}
.prog-pct{font-family:var(--mono);font-size:13px;color:var(--cy)}
.prog-bar{width:160px;height:5px;background:rgba(0,212,255,.1);border-radius:3px;border:1px solid rgba(0,212,255,.2);overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cy),var(--tl));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;box-shadow:0 0 8px rgba(0,212,255,.5)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:rgba(6,13,26,.85);backdrop-filter:blur(12px);border-right:1px solid rgba(0,212,255,.1);overflow-y:auto;flex-shrink:0;padding:12px 0}
.sb-sec{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;font-size:13px;font-weight:500;color:var(--t2);opacity:0;animation:slideLeft .4s ease forwards}
@keyframes slideLeft{to{opacity:1}}
.sb-item:hover{background:rgba(0,212,255,.06);color:var(--tx)}
.sb-item.active{background:rgba(0,212,255,.1);border-left-color:var(--cy);color:var(--cy)}
.sb-item.done .sb-dot{background:var(--tl);box-shadow:0 0 6px var(--tl)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);flex-shrink:0;transition:all .3s}
.sb-num{font-family:var(--mono);font-size:11px;color:var(--t3);min-width:22px}
.main{flex:1;overflow-y:auto}
.lesson{padding:40px 48px;max-width:880px;animation:fadeSlide .5s cubic-bezier(.4,0,.2,1)}
@keyframes fadeSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.mit-badge{display:inline-flex;align-items:center;gap:8px;padding:4px 14px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid;margin-bottom:16px;font-family:var(--mono)}
.b-live{background:rgba(0,212,255,.08);color:var(--cy);border-color:rgba(0,212,255,.3)}
.b-scaffold{background:rgba(0,255,204,.08);color:var(--tl);border-color:rgba(0,255,204,.3)}
.b-flip{background:rgba(139,92,246,.1);color:var(--vi);border-color:rgba(139,92,246,.3)}
.b-real{background:rgba(244,114,182,.08);color:var(--pk);border-color:rgba(244,114,182,.3)}
.lesson-title{font-size:30px;font-weight:700;margin-bottom:8px;color:var(--tx);line-height:1.2}
.lesson-title span{color:var(--cy)}
.lesson-desc{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:28px;max-width:640px}
.concept-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:16px 0}
.c-card{background:rgba(255,255,255,.03);border:1px solid rgba(0,212,255,.12);border-radius:8px;padding:14px;transition:all .2s}
.c-card:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.3);transform:translateY(-2px)}
.c-icon{font-size:22px;margin-bottom:6px}
.c-name{font-size:12px;font-weight:600;color:var(--cy);margin-bottom:3px;font-family:var(--mono)}
.c-desc{font-size:12px;color:var(--t2);line-height:1.5}
.code-wrap{background:#020912;border:1px solid rgba(0,212,255,.2);border-radius:10px;overflow:hidden;margin:20px 0;box-shadow:0 0 30px rgba(0,212,255,.08),0 8px 32px rgba(0,0,0,.5)}
.code-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,212,255,.05);border-bottom:1px solid rgba(0,212,255,.1)}
.code-dots{display:flex;gap:6px}
.cd{width:10px;height:10px;border-radius:50%}
.cd-r{background:#ff5f57}.cd-y{background:#ffbd2e}.cd-g{background:#28c840}
.code-lang{font-family:var(--mono);font-size:11px;color:var(--cy)}
.copy-btn{background:none;border:1px solid rgba(0,212,255,.25);color:var(--t3);font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:var(--mono);transition:all .2s}
.copy-btn:hover{border-color:var(--cy);color:var(--cy)}
.code-body{padding:20px;font-family:var(--mono);font-size:13px;line-height:2;overflow-x:auto}
.cl{display:block;opacity:0;animation:lineIn .35s ease forwards}
@keyframes lineIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.kw{color:#a78bfa;font-weight:500}.fn{color:#67e8f9}.st{color:#86efac}.cm{color:#374151;font-style:italic}.nm{color:#fbbf24}.bi{color:#34d399}.op{color:#f9a8d4}.pu{color:#cbd5e1}.de{color:#93c5fd}.sp{color:#f0abfc}
.viz{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);border-radius:10px;padding:20px;margin:20px 0}
.viz-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:14px;font-family:var(--mono)}
.quiz-wrap{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:22px;margin:22px 0}
.quiz-q{font-size:14px;font-weight:600;margin-bottom:16px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{padding:11px 16px;border:1px solid rgba(0,212,255,.15);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);background:none;transition:all .2s;text-align:left;font-family:var(--font)}
.q-opt:hover:not(:disabled){border-color:var(--cy);color:var(--tx);background:rgba(0,212,255,.07);padding-left:20px}
.q-opt.correct{border-color:var(--tl)!important;background:rgba(0,255,204,.08)!important;color:var(--tl)!important;animation:popIn .4s ease}
.q-opt.wrong{border-color:var(--pk)!important;background:rgba(244,114,182,.08)!important;color:var(--pk)!important;animation:jiggle .4s ease}
@keyframes popIn{0%{transform:scale(.97)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes jiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.quiz-fb{display:none;margin-top:12px;padding:12px 16px;border-radius:6px;font-size:13px;line-height:1.6;font-weight:500}
.quiz-fb.show{display:block;animation:fadeSlide .3s ease}
.quiz-fb.ok{background:rgba(0,255,204,.08);color:var(--tl);border:1px solid rgba(0,255,204,.25)}
.quiz-fb.fail{background:rgba(244,114,182,.08);color:var(--pk);border:1px solid rgba(244,114,182,.25)}
.tip{border-left:2px solid var(--cy);background:rgba(0,212,255,.05);padding:14px 18px;border-radius:0 8px 8px 0;margin:20px 0;font-size:13px;color:var(--t2);line-height:1.7}
.tip strong{color:var(--cy);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:var(--mono)}
.nav-footer{display:flex;gap:12px;margin-top:32px;padding-top:22px;border-top:1px solid rgba(0,212,255,.08)}
.btn{padding:10px 22px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all .2s;font-family:var(--font)}
.btn-ghost{border-color:rgba(0,212,255,.2);background:none;color:var(--t2)}
.btn-ghost:hover{border-color:var(--cy);color:var(--cy)}
.btn-next{background:var(--cy);border-color:var(--cy);color:#020912;box-shadow:0 0 16px rgba(0,212,255,.3)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 0 24px rgba(0,212,255,.5)}
.btn-done{background:rgba(0,255,204,.12);border-color:rgba(0,255,204,.4);color:var(--tl)}
.btn-done:hover{background:rgba(0,255,204,.2)}
.slabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:22px 0 10px;display:block;font-family:var(--mono)}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cp{position:absolute;opacity:0;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(600px) rotate(540deg)}}
</style>
<script>
// ─── Auth Guard ─────────────────────────────────────────────────
const AUTH_SESSION_KEY='py_session';
(function(){
  try{
    const s=JSON.parse(sessionStorage.getItem(AUTH_SESSION_KEY));
    if(!s||Date.now()-s.loginTime>8*60*60*1000){window.location.href='login.html';return;}
    document.addEventListener('DOMContentLoaded',()=>{
      const bar=document.getElementById('course-auth-bar');
      if(!bar)return;
      const isAdmin=s.role==='admin';
      bar.innerHTML=`
        <div style="display:flex;align-items:center;gap:12px">
          <a href="index.html" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:#f1f5fd;font-size:13px;font-weight:600">← Dashboard</a>
          ${isAdmin?'<a href="admin.html" style="padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;color:#8b5cf6;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);text-decoration:none">🛡️ Admin</a>':''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;align-items:center;gap:7px;padding:5px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px">
            <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#818cf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${s.name.charAt(0).toUpperCase()}</div>
            <span style="font-size:12px;font-weight:500;color:#8899bb">${s.name}</span>
          </div>
          <button onclick="sessionStorage.removeItem('py_session');window.location.href='login.html'" style="padding:5px 12px;border-radius:5px;font-size:11px;font-weight:600;color:#f43f5e;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);cursor:pointer;font-family:inherit">Sign Out</button>
        </div>`;
    });
  }catch(e){window.location.href='login.html';}
})();
</script>
</head>

<div class="grid-bg"></div><div class="glow"></div>
<div class="confetti-container" id="cfx"></div>

    <div class="logo-badge">⚡</div>

    <span class="prog-pct" id="pct">0%</span>

</div>

<div class="sidebar" id="sb"></div>

</div>

<script>
const M=[
{b:'b-scaffold',bi:'🧩',bt:'Scaffolded Steps',t:'List Comprehensions',d:'List comprehensions are the most Pythonic way to create new lists. They are faster than loops, more readable, and work for dicts and sets too. Step by step — build up to mastery.',
concepts:[{i:'📋',n:'Basic syntax',d:'[expr for item in iterable]'},{i:'🔍',n:'With filter',d:'[expr for item in iter if condition]'},{i:'📘',n:'Dict comp',d:'{k:v for k,v in pairs}'},{i:'⚡',n:'Speed',d:'Faster than for-loops — optimized at C level.'}],
code:[`<span class="cm"># Step 1 — basic: square numbers 1-10</span>`,`<span class="de">squares</span> <span class="op">=</span> [<span class="de">x</span><span class="op">**</span><span class="nm">2</span> <span class="kw">for</span> <span class="de">x</span> <span class="kw">in</span> <span class="bi">range</span>(<span class="nm">1</span><span class="pu">,</span> <span class="nm">11</span>)]`,``,`<span class="cm"># Step 2 — filter: even numbers only</span>`,`<span class="de">evens</span> <span class="op">=</span> [<span class="de">x</span> <span class="kw">for</span> <span class="de">x</span> <span class="kw">in</span> <span class="bi">range</span>(<span class="nm">20</span>) <span class="kw">if</span> <span class="de">x</span> <span class="op">%</span> <span class="nm">2</span> <span class="op">==</span> <span class="nm">0</span>]`,``,`<span class="cm"># Step 3 — dict comprehension: sale prices</span>`,`<span class="de">prices</span> <span class="op">=</span> {<span class="st">"serum"</span><span class="pu">:</span><span class="nm">500</span><span class="pu">,</span> <span class="st">"toner"</span><span class="pu">:</span><span class="nm">300</span><span class="pu">,</span> <span class="st">"cream"</span><span class="pu">:</span><span class="nm">800</span>}`,`<span class="de">sale</span>   <span class="op">=</span> {<span class="de">k</span><span class="pu">:</span> <span class="de">v</span><span class="op">*</span><span class="nm">0.8</span> <span class="kw">for</span> <span class="de">k</span><span class="pu">,</span><span class="de">v</span> <span class="kw">in</span> <span class="de">prices</span><span class="pu">.</span><span class="fn">items</span>()}`,`<span class="bi">print</span>(<span class="de">sale</span>)`,`<span class="cm"># {'serum': 400.0, 'toner': 240.0, 'cream': 640.0}</span>`,``,`<span class="cm"># Step 4 — nested: flatten 2D list</span>`,`<span class="de">matrix</span> <span class="op">=</span> [[<span class="nm">1</span><span class="pu">,</span><span class="nm">2</span>]<span class="pu">,</span>[<span class="nm">3</span><span class="pu">,</span><span class="nm">4</span>]<span class="pu">,</span>[<span class="nm">5</span><span class="pu">,</span><span class="nm">6</span>]]`,`<span class="de">flat</span>   <span class="op">=</span> [<span class="de">n</span> <span class="kw">for</span> <span class="de">row</span> <span class="kw">in</span> <span class="de">matrix</span> <span class="kw">for</span> <span class="de">n</span> <span class="kw">in</span> <span class="de">row</span>]`,`<span class="bi">print</span>(<span class="de">flat</span>)  <span class="cm"># [1, 2, 3, 4, 5, 6]`],
viz:`<div class="viz"><div class="viz-title">How a comprehension maps to a for-loop</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div><div style="font-size:11px;color:var(--t3);margin-bottom:8px">Traditional for-loop</div><div style="background:rgba(0,0,0,.3);border-radius:6px;padding:12px;font-family:var(--mono);font-size:12px;line-height:1.9"><span style="color:#a78bfa">result</span> = []<br><span style="color:#a78bfa">for</span> x <span style="color:#a78bfa">in</span> range(10):<br>&nbsp;&nbsp;result.append(x**2)</div></div><div><div style="font-size:11px;color:var(--t3);margin-bottom:8px">List comprehension (same result)</div><div style="background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:6px;padding:12px;font-family:var(--mono);font-size:12px;line-height:1.9"><span style="color:#67e8f9">result</span> = [<span style="color:#fbbf24">x**2</span> <span style="color:#a78bfa">for</span> x <span style="color:#a78bfa">in</span> range(10)]<br><br><span style="color:#374151;font-style:italic"># One line. Faster. Pythonic.</span></div></div></div></div>`,
tip:'List comprehensions are faster than for-loops because they are implemented as a C-level optimization in CPython. Use them for building new lists — not for side effects like printing.',
quiz:{q:'What does `[x*2 for x in range(5) if x > 1]` produce?',opts:['[0, 2, 4, 6, 8]','[4, 6, 8]','[2, 3, 4]','[4, 6, 8, 10]'],c:1,fb:'✅ range(5) = 0,1,2,3,4. Filter x>1 keeps 2,3,4. Then x*2 gives 4,6,8. Filter runs first (on each item), then the expression transforms it.'}},

{b:'b-live',bi:'🎥',bt:'Live Walkthrough',t:'Advanced Functions — *args, **kwargs, lambda',d:'Functions can accept any number of arguments. Lambda creates tiny anonymous functions. map() and filter() apply functions to collections. Live: build a flexible data pipeline.',
concepts:[{i:'📦',n:'*args',d:'Accepts any number of positional arguments as a tuple.'},{i:'🗂️',n:'**kwargs',d:'Accepts any number of keyword arguments as a dict.'},{i:'⚡',n:'lambda',d:'Anonymous one-line function: lambda x: x * 2'},{i:'🔄',n:'map/filter',d:'Apply a function to every item in an iterable.'}],

="de">p</span><span class="pu">:</span> <span class="de">p</span><span class="op">*</span><span class="nm">.9</span><span class="pu">,</span> <span class="de">prices</span>))`,`<span class="cm"># [90.0, 270.0, 585.0]`],
viz:`<div class="viz"><div class="viz-title">map() — applies a function to every item</div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div style="display:flex;flex-direction:column;gap:4px">${[100,300,650].map(n=>`<div style="padding:6px 14px;background:rgba(255,255,255,.06);border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--t2)">${n}</div>`).join('')}</div><div style="font-size:11px;color:var(--t3);text-align:center;padding:0 8px">→<br>map(lambda p: p*0.9)<br>→</div><div style="display:flex;flex-direction:column;gap:4px">${[90,270,585].map(n=>`<div style="padding:6px 14px;background:rgba(0,255,204,.08);border:1px solid rgba(0,255,204,.2);border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--tl)">${n}</div>`).join('')}</div></div></div>`,

{b:'b-live',bi:'🎥',bt:'Live Walkthrough',t:'OOP Part 1 — Classes & Objects',d:'Object-Oriented Programming models real-world things as objects. Each object has attributes (data) and methods (behavior). Live: build a Product class for an e-commerce catalog.',

code:[`<span class="kw">class</span> <span class="fn">Product</span><span class="pu">:</span>`,`    <span class="st">"""A single catalog product."""</span>`,``,`    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">name</span><span class="pu">,</span> <span class="de">price</span><span class="pu">,</span> <span class="de">qty</span><span class="op">=</span><span class="nm">0</span>)<span class="pu">:</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">name</span>  <span class="op">=</span> <span class="de">name</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">price</span> <span class="op">=</span> <span class="de">price</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">qty</span>   <span class="op">=</span> <span class="de">qty</span>`,``,`    <span class="kw">def</span> <span class="fn">sale_price</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">pct</span>)<span class="pu">:</span>`,`        <span class="kw">return</span> <span class="bi">round</span>(<span class="sp">self</span><span class="pu">.</span><span class="de">price</span> <span class="op">*</span> (<span class="nm">1</span> <span class="op">-</span> <span class="de">pct</span><span class="op">/</span><span class="nm">100</span>)<span class="pu">,</span> <span class="nm">2</span>)`,``,`    <span class="kw">def</span> <span class="fn">status</span>(<span class="sp">self</span>)<span class="pu">:</span>`,`        <span class="kw">if</span>   <span class="sp">self</span><span class="pu">.</span><span class="de">qty</span> <span class="op">&gt;</span> <span class="nm">10</span><span class="pu">:</span> <span class="kw">return</span> <span class="st">"instock"</span>`,`        <span class="kw">elif</span> <span class="sp">self</span><span class="pu">.</span><span class="de">qty</span> <span class="op">&gt;</span> <span class="nm">0</span><span class="pu">:</span>  <span class="kw">return</span> <span class="st">"low"</span>`,`        <span class="kw">else</span><span class="pu">:</span>               <span class="kw">return</span> <span class="st">"outofstock"</span>`,``,`<span class="de">serum</span> <span class="op">=</span> <span class="fn">Product</span>(<span class="st">"Hydra Serum"</span><span class="pu">,</span> <span class="nm">650</span><span class="pu">,</span> <span class="nm">3</span>)`,`<span class="bi">print</span>(<span class="de">serum</span><span class="pu">.</span><span class="fn">sale_price</span>(<span class="nm">20</span>))  <span class="cm"># 520.0</span>`,`<span class="bi">print</span>(<span class="de">serum</span><span class="pu">.</span><span class="fn">status</span>())        <span class="cm"># low`],
viz:`<div class="viz"><div class="viz-title">Class vs Instance — the blueprint and the building</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div style="padding:16px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.25);border-radius:8px"><div style="font-size:11px;color:var(--vi);font-family:var(--mono);margin-bottom:8px">CLASS — Product (blueprint)</div><div style="font-size:12px;color:var(--t2);line-height:1.8">name, price, qty<br>sale_price()<br>status()</div></div><div style="padding:16px;background:rgba(0,255,204,.06);border:1px solid rgba(0,255,204,.2);border-radius:8px"><div style="font-size:11px;color:var(--tl);font-family:var(--mono);margin-bottom:8px">INSTANCE — serum (real object)</div><div style="font-size:12px;color:var(--t2);line-height:1.8">name="Hydra Serum"<br>price=650<br>qty=3</div></div></div></div>`,
tip:'Think of a class as a factory mold — it defines the shape. Each Product() call creates a unique object from that mold. self is always the specific object being used.',
quiz:{q:'What does `self` refer to inside a class method?',opts:['The class itself','The current instance (the specific object calling the method)','The parent class','A global variable'],c:1,fb:'✅ self is the specific object. When serum.sale_price(20) is called, Python passes serum as self automatically. This is how the method knows which product\'s price to use.'}},

{b:'b-live',bi:'🎥',bt:'Live Walkthrough',t:'OOP Part 2 — Inheritance & Dunder Methods',d:'Inheritance lets a child class reuse and extend a parent class. Dunder (double-underscore) methods customize how your objects behave with Python operators.',

code:[`<span class="kw">class</span> <span class="fn">DigitalProduct</span>(<span class="fn">Product</span>)<span class="pu">:</span>  <span class="cm"># inherits Product!</span>`,`    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">name</span><span class="pu">,</span> <span class="de">price</span><span class="pu">,</span> <span class="de">url</span>)<span class="pu">:</span>`,`        <span class="bi">super</span>()<span class="pu">.</span><span class="fn">__init__</span>(<span class="de">name</span><span class="pu">,</span> <span class="de">price</span><span class="pu">,</span> <span class="de">qty</span><span class="op">=</span><span class="nm">999</span>)  <span class="cm"># unlimited qty</span>`,`        <span class="sp">self</span><span class="pu">.</span><span class="de">url</span> <span class="op">=</span> <span class="de">url</span>`,``,`<span class="cm"># Dunder methods — make objects Pythonic</span>`,`<span class="kw">class</span> <span class="fn">Product</span><span class="pu">:</span>`,`    <span class="kw">def</span> <span class="fn">__str__</span>(<span class="sp">self</span>)<span class="pu">:</span>`,`        <span class="kw">return</span> <span class="st">f"</span><span class="op">{</span><span class="sp">self</span><span class="pu">.</span><span class="de">name</span><span class="op">}</span><span class="st"> (BDT </span><span class="op">{</span><span class="sp">self</span><span class="pu">.</span><span class="de">price</span><span class="op">}</span><span class="st">)"</span>`,``,`    <span class="kw">def</span> <span class="fn">__lt__</span>(<span class="sp">self</span><span class="pu">,</span> <span class="de">other</span>)<span class="pu">:</span>`,`        <span class="kw">return</span> <span class="sp">self</span><span class="pu">.</span><span class="de">price</span> <span class="op">&lt;</span> <span class="de">other</span><span class="pu">.</span><span class="de">price</span>`,``,`<span class="de">p1</span> <span class="op">=</span> <span class="fn">Product</span>(<span class="st">"Serum"</span><span class="pu">,</span> <span class="nm">650</span>)`,`<span class="de">p2</span> <span class="op">=</span> <span class="fn">Product</span>(<span class="st">"Toner"</span><span class="pu">,</span> <span class="nm">300</span>)`,`<span class="bi">print</span>(<span class="de">p1</span>)           <span class="cm"># Serum (BDT 650)</span>`,`<span class="bi">print</span>(<span class="de">p2</span> <span class="op">&lt;</span> <span class="de">p1</span>)     <span class="cm"># True — 300 < 650</span>`,`<span class="bi">print</span>(<span class="bi">sorted</span>([<span class="de">p1</span><span class="pu">,</span> <span class="de">p2</span>]))  <span class="cm"># sorts by price!</span>`],
viz:`<div class="viz"><div class="viz-title">Inheritance chain — MRO (Method Resolution Order)</div><div style="text-align:center;font-family:var(--mono);font-size:12px"><div style="display:inline-block;padding:8px 20px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:6px;color:var(--cy);margin-bottom:8px">object (Python base)</div><div style="color:var(--t3)">↑ inherits</div><div style="display:inline-block;padding:8px 20px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:6px;color:var(--vi);margin:4px 0">Product</div><div style="color:var(--t3)">↑ inherits</div><div style="display:inline-block;padding:8px 20px;background:rgba(0,255,204,.08);border:1px solid rgba(0,255,204,.25);border-radius:6px;color:var(--tl)">DigitalProduct</div></div></div>`,
tip:'Dunder methods (also called magic methods) are how Python makes your objects feel native. __str__, __len__, __add__, __eq__ — implement these to make your objects behave just like built-in types.',
quiz:{q:'What does `super().__init__(...)` do in a child class?',opts:['Creates a new parent object','Calls the parent class constructor to initialize inherited attributes','Deletes the parent class','Copies all methods'],c:1,fb:'✅ super() returns a proxy to the parent class. Calling __init__ on it runs the parent\'s initialization code — so you get all the inherited attributes without duplicating code.'}},

{b:'b-scaffold',bi:'🧩',bt:'Scaffolded Steps',t:'Error Handling — try / except / finally',d:'Real programs break. Errors are not failures — they are information. Python\'s exception system lets you catch, handle, and recover from any error gracefully.',
concepts:[{i:'🛡️',n:'try',d:'Wrap risky code. Python attempts this block first.'},{i:'🎯',n:'except Type',d:'Catch specific exception types. Be precise, not broad.'},{i:'✅',n:'else',d:'Runs only if no exception was raised.'},{i:'🧹',n:'finally',d:'Always runs — cleanup, close files, release locks.'}],
code:[`<span class="kw">def</span> <span class="fn">safe_divide</span>(<span class="de">a</span><span class="pu">,</span> <span class="de">b</span>)<span class="pu">:</span>`,`    <span class="kw">try</span><span class="pu">:</span>`,`        <span class="de">result</span> <span class="op">=</span> <span class="de">a</span> <span class="op">/</span> <span class="de">b</span>`,`    <span class="kw">except</span> <span class="bi">ZeroDivisionError</span><span class="pu">:</span>`,`        <span class="kw">return</span> <span class="st">"Cannot divide by zero"</span>`,`    <span class="kw">except</span> <span class="bi">TypeError</span> <span class="kw">as</span> <span class="de">e</span><span class="pu">:</span>`,`        <span class="kw">return</span> <span class="st">f"Type error: </span><span class="op">{</span><span class="de">e</span><span class="op">}</span><span class="st">"</span>`,`    <span class="kw">else</span><span class="pu">:</span>`,`        <span class="kw">return</span> <span class="de">result</span>   <span class="cm"># only if no exception</span>`,`    <span class="kw">finally</span><span class="pu">:</span>`,`        <span class="bi">print</span>(<span class="st">"Always runs"</span>)`,``,`<span class="cm"># Raising your own exceptions</span>`,`<span class="kw">def</span> <span class="fn">set_price</span>(<span class="de">p</span>)<span class="pu">:</span>`,`    <span class="kw">if</span> <span class="de">p</span> <span class="op">&lt;</span> <span class="nm">0</span><span class="pu">:</span>`,`        <span class="kw">raise</span> <span class="bi">ValueError</span>(<span class="st">f"Price cannot be negative: </span><span class="op">{</span><span class="de">p</span><span class="op">}</span><span class="st">"</span>)`,`    <span class="kw">return</span> <span class="de">p</span>`],
viz:`<div class="viz"><div class="viz-title">Exception Hierarchy — Python built-in exceptions</div><div style="font-family:var(--mono);font-size:12px;line-height:1.9"><span style="color:var(--cy)">Exception</span><br>&nbsp;&nbsp;├─ <span style="color:var(--vi)">ValueError</span> &nbsp;<span style="color:var(--t3)">— bad value (int("abc"))</span><br>&nbsp;&nbsp;├─ <span style="color:var(--vi)">TypeError</span> &nbsp;&nbsp;<span style="color:var(--t3)">— wrong type ("a" + 1)</span><br>&nbsp;&nbsp;├─ <span style="color:var(--vi)">KeyError</span> &nbsp;&nbsp;&nbsp;<span style="color:var(--t3)">— missing dict key</span><br>&nbsp;&nbsp;├─ <span style="color:var(--vi)">IndexError</span> &nbsp;<span style="color:var(--t3)">— list index out of range</span><br>&nbsp;&nbsp;└─ <span style="color:var(--vi)">FileNotFoundError</span> <span style="color:var(--t3)">— file missing</span></div></div>`,
tip:'NEVER use bare except: — it catches SystemExit and KeyboardInterrupt too, making it impossible to stop your program. Always specify the exception type you expect.',
quiz:{q:'Why should you catch `ValueError` specifically rather than bare `except:`?',opts:['Bare except is slower','Bare except catches SystemExit and KeyboardInterrupt — making Ctrl+C impossible and hiding critical bugs','ValueError is the only exception that exists','No difference'],c:1,fb:'✅ Bare except catches everything including system signals. This breaks Ctrl+C (KeyboardInterrupt) and hides critical crashes. Always be specific — catch only what you know how to handle.'}},

{b:'b-real',bi:'⚡',bt:'Real Data',t:'File I/O & Context Managers',d:'Real programs read and write files constantly — CSVs, JSON configs, logs. Context managers guarantee files close properly even when errors occur.',
concepts:[{i:'📂',n:'open()',d:'Open files: "r" read, "w" write, "a" append, "rb" binary.'},{i:'🛡️',n:'with statement',d:'Context manager — auto-closes file even if exception occurs.'},{i:'📊',n:'csv.DictReader',d:'Read CSV rows as dicts with column names as keys.'},{i:'🔧',n:'json module',d:'json.dump() / json.load() — serialize Python to JSON.'}],
code:[`<span class="kw">import</span> <span class="de">csv</span><span class="pu">,</span> <span class="de">json</span>`,``,`<span class="cm"># Read CSV — with auto-closes the file</span>`,`<span class="kw">def</span> <span class="fn">load_products</span>(<span class="de">filepath</span>)<span class="pu">:</span>`,`    <span class="de">products</span> <span class="op">=</span> []`,`    <span class="kw">with</span> <span class="bi">open</span>(<span class="de">filepath</span><span class="pu">,</span> <span class="st">"r"</span><span class="pu">,</span> <span class="de">encoding</span><span class="op">=</span><span class="st">"utf-8"</span>) <span class="kw">as</span> <span class="de">f</span><span class="pu">:</span>`,`        <span class="kw">for</span> <span class="de">row</span> <span class="kw">in</span> <span class="de">csv</span><span class="pu">.</span><span class="fn">DictReader</span>(<span class="de">f</span>)<span class="pu">:</span>`,`            <span class="kw">try</span><span class="pu">:</span>`,`                <span class="de">products</span><span class="pu">.</span><span class="fn">append</span>({`,`                    <span class="st">"name"</span><span class="pu">:</span>  <span class="de">row</span>[<span class="st">"name"</span>]<span class="pu">.</span><span class="fn">strip</span>()<span class="pu">,</span>`,`                    <span class="st">"price"</span><span class="pu">:</span> <span class="bi">float</span>(<span class="de">row</span>[<span class="st">"price"</span>])<span class="pu">,</span>`,`                })`,`            <span class="kw">except</span> (<span class="bi">ValueError</span><span class="pu">,</span> <span class="bi">KeyError</span>) <span class="kw">as</span> <span class="de">e</span><span class="pu">:</span>`,`                <span class="bi">print</span>(<span class="st">f"⚠ Skipping bad row: </span><span class="op">{</span><span class="de">e</span><span class="op">}</span><span class="st">"</span>)`,`    <span class="kw">return</span> <span class="de">products</span>`],
viz:`<div class="viz"><div class="viz-title">with statement — what happens under the hood</div><div style="font-size:12px;color:var(--t2);line-height:1.9"><div style="margin-bottom:6px"><span style="font-family:var(--mono);color:var(--cy)">with open("file.csv") as f:</span></div>${['1. Python calls file.__enter__() → opens file, returns handle','2. Your code runs inside the block','3. If exception: Python calls file.__exit__(exc_info)','4. If no exception: Python calls file.__exit__(None)','5. file.close() is called in __exit__ — guaranteed'].map((s,i)=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:4px"><span style="color:var(--tl);font-family:var(--mono)">→</span><span>${s}</span></div>`).join('')}</div></div>`,
tip:'The "with" statement uses Python\'s context manager protocol. You can write your own using __enter__ and __exit__ methods, or the @contextmanager decorator from contextlib.',
quiz:{q:'Why use `with open(...)` instead of `f = open(...); f.close()`?',opts:['with is faster','with automatically closes the file even if an exception occurs — f.close() might never be reached','You need with to use DictReader','No difference'],c:1,fb:"✅ If an exception occurs before f.close(), the file stays open indefinitely (resource leak). with guarantees __exit__ runs no matter what — the file always closes. This is defensive, correct Python."}},

{b:'b-flip',bi:'🔄',bt:'Flipped Learning',t:'Decorators & Closures',d:'Decorators transform functions — adding logging, timing, authentication, or caching without modifying the original code. First understand closures, then decorators click immediately.',
concepts:[{i:'🎀',n:'Closure',d:'A function that captures variables from its enclosing scope.'},{i:'🎭',n:'@decorator',d:'Syntactic sugar: @timer means func = timer(func).'},{i:'📦',n:'functools.wraps',d:'Preserves the wrapped function\'s name and docstring.'},{i:'🔗',n:'Stacking',d:'Multiple decorators apply inside-out: @a @b = a(b(func))'}],
code:[`<span class="kw">import</span> <span class="de">time</span>`,`<span class="kw">from</span> <span class="de">functools</span> <span class="kw">import</span> <span class="de">wraps</span>`,``,`<span class="cm"># Step 1 — understand a closure</span>`,`<span class="kw">def</span> <span class="fn">multiplier</span>(<span class="de">factor</span>)<span class="pu">:</span>`,`    <span class="kw">def</span> <span class="fn">inner</span>(<span class="de">x</span>)<span class="pu">:</span>`,`        <span class="kw">return</span> <span class="de">x</span> <span class="op">*</span> <span class="de">factor</span>   <span class="cm"># captures 'factor'</span>`,`    <span class="kw">return</span> <span class="de">inner</span>`,``,`<span class="de">double</span> <span class="op">=</span> <span class="fn">multiplier</span>(<span class="nm">2</span>)`,`<span class="bi">print</span>(<span class="de">double</span>(<span class="nm">7</span>))    <span class="cm"># 14</span>`,``,`<span class="cm"># Step 2 — a real timing decorator</span>`,`<span class="kw">def</span> <span class="fn">timer</span>(<span class="de">func</span>)<span class="pu">:</span>`,`    <span class="op">@</span><span class="de">wraps</span>(<span class="de">func</span>)`,`    <span class="kw">def</span> <span class="fn">wrapper</span>(<span class="op">*</span><span class="de">args</span><span class="pu">,</span> <span class="op">**</span><span class="de">kwargs</span>)<span class="pu">:</span>`,`        <span class="de">t0</span> <span class="op">=</span> <span class="de">time</span><span class="pu">.</span><span class="fn">perf_counter</span>()`,`        <span class="de">res</span> <span class="op">=</span> <span class="fn">func</span>(<span class="op">*</span><span class="de">args</span><span class="pu">,</span> <span class="op">**</span><span class="de">kwargs</span>)`,`        <span class="bi">print</span>(<span class="st">f"</span><span class="op">{</span><span class="de">func</span><span class="pu">.</span><span class="de">__name__</span><span class="op">}</span><span class="st">: </span><span class="op">{</span><span class="de">time</span><span class="pu">.</span><span class="fn">perf_counter</span>()<span class="op">-</span><span class="de">t0</span><span class="pu">:</span><span class="st">.4f</span><span class="op">}</span><span class="st">s"</span>)`,`        <span class="kw">return</span> <span class="de">res</span>`,`    <span class="kw">return</span> <span class="de">wrapper</span>`,``,`<span class="op">@</span><span class="fn">timer</span>`,`<span class="kw">def</span> <span class="fn">process_orders</span>(<span class="de">n</span>)<span class="pu">:</span>`,`    <span class="kw">return</span> <span class="bi">sum</span>(<span class="bi">range</span>(<span class="de">n</span>))`],
viz:`<div class="viz"><div class="viz-title">@timer desugared — what Python does behind the scenes</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-family:var(--mono);font-size:12px"><div><div style="color:var(--t3);margin-bottom:6px">What you write:</div><div style="background:rgba(0,0,0,.3);padding:12px;border-radius:6px;line-height:2"><span style="color:#f0abfc">@timer</span><br><span style="color:#a78bfa">def</span> <span style="color:#67e8f9">process</span>(n):<br>&nbsp;&nbsp;...</div></div><div><div style="color:var(--t3);margin-bottom:6px">What Python does:</div><div style="background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);padding:12px;border-radius:6px;line-height:2"><span style="color:#a78bfa">def</span> <span style="color:#67e8f9">process</span>(n):<br>&nbsp;&nbsp;...<br><span style="color:#67e8f9">process</span> = <span style="color:#f0abfc">timer</span>(process)</div></div></div></div>`,
tip:'Decorators are just functions that take a function and return a new function. @decorator is syntactic sugar. Always use @functools.wraps to preserve the original function\'s metadata.',
quiz:{q:'What does `@functools.wraps(func)` do inside a decorator?',opts:['Makes the decorator faster','Preserves the wrapped function\'s __name__, __doc__, and other attributes so introspection still works','Allows multiple decorators','Adds type checking'],c:1,fb:"✅ Without @wraps, process_orders.__name__ would return 'wrapper' — confusing for debugging and introspection. @wraps copies all the metadata from the original function to the wrapper."}},

{b:'b-real',bi:'⚡',bt:'Real Data',t:'Modules, Packages & pip',d:'Python\'s strength is its ecosystem. Modules organize code into files; packages organize modules into folders; pip installs third-party packages from PyPI (250,000+ packages).',

let cur=0,done=new Set();
function buildSB(){
  document.getElementById('sb').innerHTML='<div class="sb-sec">8 Intermediate Modules</div>'+
    M.map((m,i)=>`<div class="sb-item${i===0?' active':''}${done.has(i)?' done':''}" onclick="go(${i})" style="animation-delay:${i*.05}s"><span class="sb-num">0${i+1}</span><span class="sb-dot"></span>${m.t}</div>`).join('');
}
function render(idx){
  const m=M[idx];
  document.getElementById('area').innerHTML=`<div class="lesson">
    <div class="mit-badge ${m.b}">${m.bi} ${m.bt}</div>
    <h1 class="lesson-title">${m.t}</h1>
    <p class="lesson-desc">${m.d}</p>
    <span class="slabel">Core Concepts</span>
    <div class="concept-row">${m.concepts.map(c=>`<div class="c-card"><div class="c-icon">${c.i}</div><div class="c-name">${c.n}</div><div class="c-desc">${c.d}</div></div>`).join('')}</div>
    <span class="slabel">Animated Code</span>
    <div class="code-wrap">
      <div class="code-top"><div class="code-dots"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div></div><span class="code-lang">python</span><button class="copy-btn" onclick="copyC(this)">copy</button></div>
      <div class="code-body">${m.code.map((ln,i)=>`<span class="cl" style="animation-delay:${i*.055}s">${ln||'&nbsp;'}</span>`).join('\n')}</div>
    </div>
    ${m.viz}
    <div class="tip"><strong>// MIT Insight</strong>${m.tip}</div>
    <span class="slabel">Knowledge Check</span>
    <div class="quiz-wrap">
      <div class="quiz-q">${m.quiz.q}</div>
      <div class="quiz-opts" id="qo">${m.quiz.opts.map((o,i)=>`<button class="q-opt" onclick="ans(${i},${m.quiz.c})">${o}</button>`).join('')}</div>
      <div class="quiz-fb" id="qf"></div>
    </div>
    <div class="nav-footer">
      ${idx>0?`<button class="btn btn-ghost" onclick="go(${idx-1})">← Previous</button>`:''}
      <button class="btn btn-done" onclick="markDone(${idx})">✓ Mark Done</button>
      ${idx<M.length-1?`<button class="btn btn-next" onclick="go(${idx+1})">Next Module →</button>`:`<button class="btn btn-next" onclick="celebrate()">🎉 Complete!</button>`}
    </div>
  </div>`;
}
function go(idx){cur=idx;render(idx);document.querySelectorAll('.sb-item').forEach((el,i)=>el.classList.toggle('active',i===idx));document.querySelector('.main').scrollTo(0,0);upProg();}
function ans(ch,co){document.querySelectorAll('.q-opt').forEach((o,i)=>{o.disabled=true;if(i===co)o.classList.add('correct');else if(i===ch&&ch!==co)o.classList.add('wrong');});const fb=document.getElementById('qf');fb.className='quiz-fb show '+(ch===co?'ok':'fail');fb.textContent=M[cur].quiz.fb;if(ch===co)cfx();}
function markDone(idx){done.add(idx);document.querySelectorAll('.sb-item')[idx].classList.add('done');upProg();if(idx<M.length-1)go(idx+1);}
function upProg(){const p=Math.round(done.size/M.length*100);document.getElementById('fill').style.width=p+'%';document.getElementById('pct').textContent=p+'%';}
function copyC(btn){const t=btn.closest('.code-wrap').querySelector('.code-body').innerText;navigator.clipboard.writeText(t).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',1500);});}
function cfx(){const cols=['#00d4ff','#00ffcc','#8b5cf6','#f472b6','#fbbf24'];const c=document.getElementById('cfx');for(let i=0;i<50;i++){const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'3px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*.5}s;animation-duration:${1+Math.random()}s`;c.appendChild(p);setTimeout(()=>p.remove(),2500);}};
function celebrate(){cfx();setTimeout(cfx,600);alert('⚡ Intermediate Complete!\n\n✅ List Comprehensions\n✅ *args **kwargs lambda\n✅ OOP Classes\n✅ Inheritance & Dunders\n✅ Error Handling\n✅ File I/O & CSV\n✅ Decorators\n✅ Modules & pip\n\nNext: Python Advanced!');}
const slabel=`<span class="slabel">`;
document.head.insertAdjacentHTML('beforeend',`<style>.slabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:22px 0 10px;display:block;font-family:var(--mono)}</style>`);
buildSB();go(0);
</script>
